  let tries = 0;

    if(typeof firebase !== "undefined" && typeof firebase.firestore === "function") { resolve(); return; }
    tries++;
    if(tries > 100) { reject(new Error("Firebase SDK failed to load after 5 seconds")); return; }
    setTimeout(check, 50);
  };
  check();
});

// ─── Animated Counter ─────────────────────────────────────────
const AnimCounter = ({target, prefix="", suffix="", duration=1200}) => {
  const [val,setVal] = useState(0);
  const ref = useRef(null);
  useEffect(()=>{
    const observer = new IntersectionObserver(entries=>{
      if(entries[0].isIntersecting){
        const num = parseFloat(String(target).replace(/[^0-9.]/g,""))||0;
        const start = Date.now();
        const tick = ()=>{
          const progress = Math.min((Date.now()-start)/duration,1);
          const ease = 1-Math.pow(1-progress,3);
          setVal(Math.round(ease*num));
          if(progress<1) requestAnimationFrame(tick);
        };
        tick();
        observer.disconnect();
      }
    },{threshold:0.3});
    if(ref.current) observer.observe(ref.current);
    return ()=>observer.disconnect();
  },[target]);
  return <span ref={ref} className="count-anim">{prefix}{val.toLocaleString()}{suffix}</span>;
};

const SupplierAPI = {
  async call(supplier, action, params={}){
    if(!supplier?.url || !supplier?.key) throw new Error("Supplier not configured");
    const body = new URLSearchParams({ key: supplier.key, action, ...params });
    const res = await fetch(supplier.url, { method:"POST", body });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    try { return JSON.parse(text); } catch{ throw new Error("Invalid supplier response: "+text.slice(0,100)); }
  },
  async getServices(supplier){ return this.call(supplier,"services"); },
  async addOrder(supplier, serviceId, link, quantity){
    return this.call(supplier,"add",{service:serviceId,link,quantity});
  },
  async getStatus(supplier, orderId){
    return this.call(supplier,"status",{order:orderId});
  },
  async getBalance(supplier){
    return this.call(supplier,"balance");
  }
};

    }catch{ return {type:"percent",value:40}; }
  },
  apply(costPrice, settings){
    const cost = parseFloat(costPrice)||0;
    if(!settings) return cost;
    if(settings.type==="percent") return parseFloat((cost*(1+(settings.value||40)/100)).toFixed(2));
    return parseFloat((cost+(settings.value||0)).toFixed(2));
  }
};

// ─── Duplicate UTR Detection ──────────────────────────────────
const UTRGuard = {
  async isUsed(utr){
    try{
      const fs = await getFS(); if(!fs) return false;
      const snap = await fs.collection("deposits").where("utr","==",utr.trim()).get();
      return !snap.empty;
    }catch{ return false; }
  }
};

const Signup = ({ goLogin, onSuccess }) => {
  const [form,setForm]=useState({name:"",email:"",password:"",confirm:""});
  const [errs,setErrs]=useState({});
  const [loading,setLoading]=useState(false);
  const [done,setDone]=useState(false);
  const [errMsg,setErrMsg]=useState("");
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));

  const validate=()=>{
    const e={};
    if(!form.name.trim()) e.name="Full name required";
    if(!form.email.includes("@")) e.email="Enter valid email";
    if(form.password.length<6) e.password="Min 6 characters";
    if(form.password!==form.confirm) e.confirm="Passwords don't match";
    setErrs(e); return !Object.keys(e).length;
  };

  const handleSignup=async()=>{
    if(!validate()) return;
    setErrMsg("");
    setLoading(true);
    try {
      const auth = await getFirebaseAuth();
      if(auth){
        const cred = await auth.createUserWithEmailAndPassword(form.email, form.password);
        await cred.user.sendEmailVerification();
        const referralCode = getReferral();
        // Save user to DB with referral
        DB.addUser({
          id:"USR-"+Date.now(),
          name:form.name,
          email:form.email,
          balance:0,
          orders:0,
          joined:today(),
          status:"Active",
          referral: referralCode,
          referredBy: referralCode,
        });
        if(referralCode) clearReferral(); // clear after successful use
        setLoading(false);
        setDone(true);
      }
    } catch(e){
      setLoading(false);
      if(e.code==="auth/email-already-in-use")
        setErrMsg("This email is already registered! Please log in instead.");
      else if(e.code==="auth/invalid-email")
        setErrMsg("Invalid email address. Please check and try again.");
      else if(e.code==="auth/weak-password")
        setErrMsg("Password too weak. Use at least 6 characters.");
      else setErrMsg("Error: " + (e.code || e.message || "Unknown"));
    }
  };

  return (
    <AuthWrap>
      <Logo/>
      <div style={{margin:"28px 0 24px"}}>
        <h2 style={{fontFamily:"Syne,sans-serif",fontSize:26,fontWeight:900,color:"#f0f0ff",marginBottom:5}}>
          {done?"Check Your Email! 📧":"Create Account"}
        </h2>
        <p style={{color:C.muted,fontSize:13}}>
          {done?"We sent a verification link to your email. Click it to activate your account!":"Start growing your social media today"}
        </p>
      </div>

      {!done&&<>
        {errMsg&&<div style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",borderRadius:11,padding:"12px 16px",marginBottom:18,color:"#f87171",fontSize:13}}>⚠ {errMsg}</div>}
        <Inp label="Full Name" value={form.name} onChange={e=>F("name",e.target.value)} placeholder="Your full name" error={errs.name} icon="👤"/>
        <Inp label="Email Address" type="email" value={form.email} onChange={e=>F("email",e.target.value)} placeholder="you@email.com" error={errs.email} icon="📧"/>
        <Inp label="Password" type="password" value={form.password} onChange={e=>F("password",e.target.value)} placeholder="Min 6 characters" error={errs.password} icon="🔒"/>
        <Inp label="Confirm Password" type="password" value={form.confirm} onChange={e=>F("confirm",e.target.value)} placeholder="Repeat password" error={errs.confirm} icon="🔒"/>
        <Btn onClick={handleSignup} loading={loading} style={{width:"100%",justifyContent:"center",marginTop:4}} size="lg">Create Account →</Btn>
        <p style={{textAlign:"center",marginTop:18,color:C.muted,fontSize:13}}>
          Have an account? <span onClick={goLogin} style={{color:C.purpleL,fontWeight:700,cursor:"pointer"}}>Log In</span>
        </p>
      </>}

      {done&&(
        <div style={{textAlign:"center",padding:"28px 0"}}>
          <div style={{width:76,height:76,borderRadius:"50%",background:C.gP,margin:"0 auto 18px",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:34,boxShadow:"0 0 40px rgba(124,58,237,.4)"}}>📧</div>
          <h3 style={{fontWeight:900,color:"#c4b5fd",fontSize:18,marginBottom:8}}>Verification Email Sent!</h3>
          <p style={{color:C.muted,fontSize:13,marginBottom:20}}>Check your inbox at<br/><strong style={{color:"#f0f0ff"}}>{form.email}</strong><br/>and click the link to verify.</p>
          <Btn onClick={goLogin} style={{width:"100%",justifyContent:"center"}} size="lg">Go to Login →</Btn>
        </div>
      )}
    </AuthWrap>
  );
};

// ─── Auth — LOGIN ─────────────────────────────────────────────
const Login = ({ goSignup, onUserLogin, onAdminLogin }) => {
  const [form,setForm]=useState({email:"",password:""});
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const [resetSent,setResetSent]=useState(false);
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));

  const handle=async()=>{
    setErr("");
    if(!form.email||!form.password){ setErr("Please fill in all fields"); return; }
    setLoading(true);
    try {
      const auth = await getFirebaseAuth();
      if(!auth){ setLoading(false); setErr("Login service unavailable. Please try again."); return; }
      const cred = await auth.signInWithEmailAndPassword(form.email, form.password);
      setLoading(false);
      // Check if this is the admin account — password verified by Firebase, never in code
      if(cred.user.email.toLowerCase().trim() === ADMIN_EMAIL.toLowerCase()) {
        onAdminLogin();
      } else {
        onUserLogin(cred.user.displayName||form.email.split("@")[0], form.email);
      }
    } catch(e){
      setLoading(false);
      if(e.code==="auth/user-not-found"||e.code==="auth/wrong-password"||e.code==="auth/invalid-credential")
        setErr("Wrong email or password. Please try again.");
      else if(e.code==="auth/too-many-requests")
        setErr("Too many attempts. Please wait a few minutes.");
      else setErr("Login failed: " + (e.message||"Unknown error"));
    }
  };

  const handleForgot=async()=>{
    if(!form.email){ setErr("Enter your email above first"); return; }
    try {
      const auth = await getFirebaseAuth();
      if(auth){ await auth.sendPasswordResetEmail(form.email); setResetSent(true); }
    } catch(e){ setErr("Could not send reset email. Check your email address."); }
  };

  return (
    <AuthWrap>
      <Logo/>
      <div style={{margin:"28px 0 24px"}}>
        <h2 style={{fontFamily:"Syne,sans-serif",fontSize:26,fontWeight:900,color:"#f0f0ff",marginBottom:5}}>Welcome Back</h2>
        <p style={{color:C.muted,fontSize:13}}>Log in to your OpulentSMM account</p>
      </div>
      {err&&<div style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",borderRadius:11,padding:"12px 16px",marginBottom:18,color:"#f87171",fontSize:13}}>⚠ {err}</div>}
      {resetSent&&<div style={{background:"rgba(52,211,153,.1)",border:"1px solid rgba(52,211,153,.3)",borderRadius:11,padding:"12px 16px",marginBottom:18,color:"#34d399",fontSize:13}}>✅ Password reset email sent! Check your inbox.</div>}
      <Inp label="Email" type="email" value={form.email} onChange={e=>F("email",e.target.value)} placeholder="you@email.com" icon="📧"/>
      <Inp label="Password" type="password" value={form.password} onChange={e=>F("password",e.target.value)} placeholder="Your password" icon="🔒"/>
      <div style={{textAlign:"right",marginTop:-8,marginBottom:18}}>
        <span onClick={handleForgot} style={{color:C.purpleL,fontSize:12,cursor:"pointer",fontWeight:600}}>Forgot password?</span>
      </div>
      <Btn onClick={handle} loading={loading} style={{width:"100%",justifyContent:"center"}} size="lg">Log In →</Btn>
      <p style={{textAlign:"center",color:C.muted,fontSize:13}}>
        No account? <span onClick={goSignup} style={{color:C.purpleL,fontWeight:700,cursor:"pointer"}}>Sign Up Free</span>
      </p>
    </AuthWrap>
  );
};

);

// ═══════════════════════════════════════════════════════════════
const UserDash = ({ userName, userEmail, onLogout }) => {
  const [page,setPage]=useState("overview");
  const [orders,setOrders]=useState([]);
  const [balance,setBalance]=useState(0);
  const [txns,setTxns]=useState([]);
  const [announcements]=useState([]);
  const [showProfile,setShowProfile]=useState(false);
  const [dashLoading,setDashLoading]=useState(false);

  // ── Back button: push history on page change ─────────────
  const goPage = React.useCallback((p) => {
    window.history.pushState({screen:"user", page:p},"",window.location.pathname);
    setPage(p);
  }, []);

  // ── Listen to popstate inside dashboard ──────────────────
  useEffect(()=>{
    // Set initial state for current page
    window.history.replaceState({screen:"user", page:"overview"},"",window.location.pathname);

    const handlePop=(e)=>{
      const state = e.state||{};
      if(state.screen==="user"){
        // Go to the previous dashboard page
        setPage(state.page||"overview");
      } else if(state.screen==="landing"||!state.screen){
        // Back pressed from first page of dashboard — go to overview, don't leave site
        window.history.pushState({screen:"user",page:"overview"},"",window.location.pathname);
        setPage("overview");
      }
    };
    window.addEventListener("popstate", handlePop);
    return()=>window.removeEventListener("popstate", handlePop);
  },[]);

  // Load everything fresh from Firebase on login
  useEffect(()=>{
    let mounted = true;
    const loadAll = async () => {
      try {
        // Load balance
        const bal = await DB.getBalanceFromFirebase(userEmail);
        if(mounted && bal !== null && bal !== undefined) setBalance(bal);
        // Load orders (only this user's)
        const allOrders = await DB.getOrdersFromFirebase();
        const normEmail = (userEmail||"").toLowerCase().trim();
        if(mounted) setOrders(allOrders.filter(o=>(o.userEmail||"").toLowerCase().trim()===normEmail));
      } catch(e){ console.error("Load failed:",e); }
      if(mounted) setDashLoading(false);
    };
    loadAll();

    // Poll balance + notify on change
    let prevBal = null;
    const poll = async () => {
      try {
        const bal = await DB.getBalanceFromFirebase(userEmail);
        if(mounted && bal !== null && bal !== undefined) {
          if(prevBal !== null && bal > prevBal){
            Toast.success(`💰 ₹${(bal-prevBal).toFixed(2)} added to your wallet!`);
          }
          prevBal = bal;
          setBalance(bal);
        }
      } catch(e){ console.error("Poll error:",e); }
    };
    poll();
    const iv = setInterval(poll, 5000);
    return () => { mounted=false; clearInterval(iv); };
  },[userEmail]);

  // Background order status sync every 5 minutes
  useEffect(()=>{
    if(!userEmail) return;
    const checkOrderStatuses = async() => {
      try{
        const fs = await getFS(); if(!fs) return;
        const suppSnap = await fs.collection("config").doc("suppliers").get();
        const suppliers = suppSnap.exists ? (suppSnap.data().list||[]) : [];
        const active = suppliers.find(s=>s.active);
        if(!active) return;
        const myOrders = await DB.getOrdersFromFirebase();
        const normEmail = (userEmail||"").toLowerCase().trim();
        const pending = myOrders.filter(o=>
          (o.userEmail||"").toLowerCase().trim()===normEmail &&
          o.supplierOrderId &&
          ["Processing","Pending"].includes(o.status)
        );
        for(const order of pending.slice(0,5)){
          try{
            const status = await SupplierAPI.getStatus(active, order.supplierOrderId);
            let newStatus = order.status;
            if(status?.status==="Completed") newStatus="Completed";
            else if(status?.status==="Cancelled") newStatus="Cancelled";
            else if(status?.status==="In progress") newStatus="Processing";
            if(newStatus!==order.status){
              await fs.collection("orders").where("id","==",order.id).get()
                .then(snap=>snap.forEach(d=>d.ref.update({status:newStatus})));
              if(newStatus==="Completed"){
                Toast.success(`✅ Order ${order.id} completed!`);
                // Push notification
                try{
                  const nid="NOTIF-"+Date.now();
                  await (await getFS())?.collection("notifications").doc(nid).set({
                    id:nid,userEmail:(userEmail||"").toLowerCase().trim(),type:"order_completed",
                    title:"✅ Order Completed!",
                    body:`Your order for ${order.service} has been delivered successfully.`,
                    date:today(),createdAt:Date.now(),read:false,action:"orders"
                  });
                }catch{}
              }
            }
          }catch{}
        }
      }catch(e){ console.error("Status check failed:",e); }
    };
    const statusIv = setInterval(checkOrderStatuses, 5*60*1000);
    return ()=>clearInterval(statusIv);
  },[userEmail]);

  // Sync balance to DB whenever it changes
  const setBalanceSync=(val)=>{
    const n=typeof val==="function"?val(balance):val;
    setBalance(n);
    DB.updateUserBalance(userEmail,n);
  };
  // Sync orders to DB when placed + auto-submit to supplier
  const addOrderSync=async(newOrder)=>{
    const withUser={...newOrder,userEmail,userName,status:"Processing"};
    DB.addOrder(withUser);
    Toast.success("✦ Order placed! Processing now...");
    // Try to auto-submit to supplier
    try{
      const fs = await getFS();
      if(fs){
        const suppSnap = await fs.collection("config").doc("suppliers").get();
        const suppliers = suppSnap.exists ? (suppSnap.data().list||[]) : [];
        const activeSupplier = suppliers.find(s=>s.active);
        if(activeSupplier && newOrder.supplierServiceId){
          const result = await SupplierAPI.addOrder(activeSupplier, newOrder.supplierServiceId, newOrder.link, newOrder.qty);
          if(result?.order){
            // Update order with supplier order ID
            const fs2 = await getFS();
            if(fs2) fs2.collection("orders").where("id","==",newOrder.id).get()
              .then(snap=>snap.forEach(d=>d.ref.update({supplierOrderId:result.order,status:"Processing"})));
          }
        }
      }
    }catch(e){ console.error("Supplier submit failed:",e); }
    // Reload from Firebase
    const allOrders = await DB.getOrdersFromFirebase();
    const normEmail = (userEmail||"").toLowerCase().trim();
    setOrders(allOrders.filter(o=>(o.userEmail||"").toLowerCase().trim()===normEmail));
  };
  // Sync txns to DB
  const addTxnSync=(txn)=>{
    const withUser={...txn,email:userEmail,userName};
    DB.addTxn(withUser);
    setTxns(DB.getTxns(userEmail));
  };

  const NAV=[
    {id:"overview",   label:"Overview",      icon:"⊞"},
    {id:"neworder",   label:"New Order",     icon:"✦"},
    {id:"orders",     label:"My Orders",     icon:"📦"},
    {id:"wallet",     label:"Wallet",        icon:"◈"},
    {id:"addfunds",   label:"Add Funds",     icon:"⊕"},
    {id:"services",   label:"Services",      icon:"◇"},
    {id:"influencer", label:"Influencer",    icon:"🌟"},
    {id:"support",    label:"Support",       icon:"💬"},
    {id:"settings",   label:"Profile",       icon:"👤"},
  ];

  const renderPage=()=>{
    switch(page){
      case "overview":   return <UserOverview orders={orders} balance={balance} setPage={goPage} userName={userName} announcements={announcements} userEmail={userEmail}/>;
      case "neworder":   return <UserNewOrder orders={orders} addOrderSync={addOrderSync} balance={balance} setBalance={setBalanceSync} setPage={goPage}/>;
      case "orders":     return <UserOrders orders={orders} setOrders={setOrders} userEmail={userEmail}/>;
      case "wallet":     return <UserWallet balance={balance} txns={txns} userEmail={userEmail}/>;
      case "addfunds":   return <UserAddFunds balance={balance} setBalance={setBalanceSync} setPage={goPage} setTxns={addTxnSync} userName={userName} userEmail={userEmail}/>;
      case "services":   return <UserServices setPage={goPage}/>;
      case "influencer": return <UserInfluencer userEmail={userEmail} userName={userName}/>;
      case "support":    return <UserSupport userEmail={userEmail} userName={userName}/>;
      case "settings":   return <UserProfile userName={userName} userEmail={userEmail} balance={balance} orders={orders} onLogout={onLogout}/>;
      default:           return <UserOverview orders={orders} balance={balance} setPage={goPage} userName={userName} announcements={announcements} userEmail={userEmail}/>;
    }
  };

  return (
    <div style={{display:"flex",minHeight:"100vh",background:C.bg}}>
      {/* SIDEBAR */}
      <aside className="sidebar" style={{width:224,minHeight:"100vh",
        background:"linear-gradient(180deg,#09090f 0%,#06060a 100%)",
        borderRight:`1px solid ${C.border}`,padding:"22px 13px",
        display:"flex",flexDirection:"column",position:"fixed",left:0,top:0,bottom:0,zIndex:100}}>
        <div style={{marginBottom:22,padding:"0 4px"}}><Logo/></div>

        {/* User info card */}
        <div style={{marginBottom:20,padding:"12px 14px",background:"rgba(255,255,255,.03)",
          borderRadius:13,border:`1px solid ${C.border}`,cursor:"pointer"}}
          onClick={()=>setPage("settings")}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:C.gP,
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:"#fff",flexShrink:0}}>
              {(userName||"U")[0].toUpperCase()}
            </div>
            <div style={{overflow:"hidden",flex:1}}>
              <div style={{fontWeight:700,color:"#c4b5fd",fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{userName}</div>
              <div style={{fontSize:10,color:C.muted,marginTop:1}}>Balance: <span style={{color:C.goldL,fontWeight:700}}>{fmt(balance)}</span></div>
            </div>
            <span style={{fontSize:12,color:C.muted}}>→</span>
          </div>
        </div>

        <nav style={{flex:1}}>
          {NAV.map(item=><NavItem key={item.id} item={item} active={page===item.id} onClick={()=>goPage(item.id)}/>)}
        </nav>

        <Divider/>
        <button onClick={onLogout} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",
          marginTop:10,width:"100%",background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.2)",
          borderRadius:10,color:"#f87171",fontSize:13,fontWeight:600,cursor:"pointer",transition:"all .2s"}}
          onMouseEnter={e=>{ e.currentTarget.style.background="rgba(239,68,68,.18)"; }}
          onMouseLeave={e=>{ e.currentTarget.style.background="rgba(239,68,68,.08)"; }}>
          🚪 Log Out
        </button>
      </aside>

      {/* MAIN */}
      <main className="dash-main" style={{flex:1,marginLeft:224,padding:"28px 32px",minHeight:"100vh",maxWidth:"calc(100vw - 224px)"}}>
        {renderPage()}
      </main>

      <MobileBar page={page} setPage={goPage} isAdmin={false} onLogout={onLogout}/>
    </div>
  );
};


// ─── Notification Bell ────────────────────────────────────────
const NotifBell = ({ userEmail, setPage }) => {
  const [notifs,setNotifs]=useState([]);
  const [open,setOpen]=useState(false);
  const [unread,setUnread]=useState(0);
  const ref=useRef(null);

  useEffect(()=>{
    if(!userEmail) return;
    const load=async()=>{
      try{
        const fs=await getFS(); if(!fs) return;
        const snap=await fs.collection("notifications")
          .where("userEmail","==",userEmail.toLowerCase().trim())
          .get();
        const list=snap.docs.map(d=>({id:d.id,...d.data()}))
          .sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))
          .slice(0,20);
        setNotifs(list);
        setUnread(list.filter(n=>!n.read).length);
      }catch{}
    };
    load();
    const iv=setInterval(load,15000);
    return()=>clearInterval(iv);
  },[userEmail]);

  const markRead=async()=>{
    if(unread===0) return;
    try{
      const fs=await getFS(); if(!fs) return;
      const batch=notifs.filter(n=>!n.read);
      for(const n of batch){
        await fs.collection("notifications").doc(n.id).update({read:true});
      }
      setNotifs(p=>p.map(n=>({...n,read:true})));
      setUnread(0);
    }catch{}
  };

  useEffect(()=>{
    const handler=(e)=>{ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[]);

  const typeIcon={deposit_approved:"💰",order_completed:"✅",order_cancelled:"❌",info:"ℹ️"};

  return (
    <div ref={ref} style={{position:"relative"}}>
      <div onClick={()=>{ setOpen(o=>!o); if(!open) markRead(); }}
        style={{width:38,height:38,borderRadius:10,background:"rgba(255,255,255,.05)",
          border:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,cursor:"pointer"}}>
        🔔
        {unread>0&&<div style={{position:"absolute",top:-4,right:-4,minWidth:16,height:16,
          borderRadius:8,background:"#ef4444",display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:9,fontWeight:900,color:"#fff",border:"2px solid #06060a",padding:"0 3px",animation:"popIn .3s ease"}}>{unread>9?"9+":unread}</div>}
      </div>
      {open&&(
        <div style={{position:"absolute",right:0,top:46,width:320,maxHeight:400,overflowY:"auto",
          background:"#09090f",border:"1px solid rgba(124,58,237,.35)",borderRadius:14,
          boxShadow:"0 16px 48px rgba(0,0,0,.6)",zIndex:500}}>
          <div style={{padding:"14px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontWeight:800,color:"#e8e8f2",fontSize:14}}>🔔 Notifications</span>
            {unread>0&&<span style={{fontSize:11,color:C.muted}}>{unread} unread</span>}
          </div>
          {notifs.length===0?(
            <div style={{padding:30,textAlign:"center",color:C.muted,fontSize:13}}>No notifications yet</div>
          ):notifs.map(n=>(
            <div key={n.id} style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,
              background:n.read?"transparent":"rgba(124,58,237,.06)",
              cursor:"pointer",transition:"background .15s"}}
              onClick={()=>{ setOpen(false); if(n.action) setPage(n.action); }}>
              <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                <span style={{fontSize:18,flexShrink:0}}>{typeIcon[n.type]||"📢"}</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:n.read?500:700,color:"#e8e8f2",fontSize:13,marginBottom:2}}>{n.title}</div>
                  <div style={{fontSize:11,color:C.muted,lineHeight:1.4}}>{n.body}</div>
                  <div style={{fontSize:10,color:C.muted,marginTop:4}}>{n.date}</div>
                </div>
                {!n.read&&<div style={{width:7,height:7,borderRadius:"50%",background:"#7c3aed",flexShrink:0,marginTop:3}}/>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

// ─── User: New Order ──────────────────────────────────────────
const UserNewOrder = ({ orders, addOrderSync, balance, setBalance, setPage }) => {
  const [step,setStep]=useState(1);
  const [pf,setPf]=useState("All");
  const [sel,setSel]=useState(null);
  const [link,setLink]=useState("");
  const [qty,setQty]=useState(1000);
  const [coupon,setCoupon]=useState("");
  const [disc,setDisc]=useState(0);
  const [couponMsg,setCouponMsg]=useState("");
  const [linkErr,setLinkErr]=useState("");
  const [loading,setLoading]=useState(false);

  const filtered=(pf==="All"?SERVICES:SERVICES.filter(s=>s.platform===pf)).filter(s=>!s.hidden);
  // Price calc: use tiers if available, else price per unit
  const calcTierPrice = (svc, qty) => {
    if (!svc) return 0;
    if (!svc.tiers) return qty * svc.price;
    const tiers = [...svc.tiers].sort((a,b)=>a.qty-b.qty);
    // Exact match
    const exact = tiers.find(t=>t.qty===qty);
    if (exact) return exact.price;
    // Below min tier — pro-rate from first tier
    if (qty < tiers[0].qty) return (qty/tiers[0].qty)*tiers[0].price;
    // Above max tier — pro-rate from last tier
    const last = tiers[tiers.length-1];
    if (qty >= last.qty) return last.price + ((qty-last.qty)/last.qty)*last.price;
    // Interpolate between tiers
    for (let i=0;i<tiers.length-1;i++) {
      if (qty>=tiers[i].qty && qty<=tiers[i+1].qty) {
        const r=(qty-tiers[i].qty)/(tiers[i+1].qty-tiers[i].qty);
        return tiers[i].price + r*(tiers[i+1].price - tiers[i].price);
      }
    }
    return qty*(tiers[0].price/tiers[0].qty);
  };
  const raw=calcTierPrice(sel, qty);
  const discAmt=raw*(disc/100);
  const total=raw-discAmt;

  const applyCoupon=()=>{
    const d=VALID_COUPONS[coupon.trim().toUpperCase()];
    if(d){ setDisc(d); setCouponMsg(`✅ ${d}% discount applied!`); }
    else { setDisc(0); setCouponMsg(coupon?"❌ Invalid code. Check and try again.":""); }
  };

  const place=()=>{
    if(total>balance){ alert("Insufficient balance! Go to Add Funds."); return; }
    setLoading(true);
    setTimeout(()=>{
      const newOrd={ id:uid(), service:sel.name, platform:sel.platform, icon:sel.icon,
        qty, price:parseFloat(total.toFixed(2)), status:"Pending", date:today(), link };
      addOrderSync(newOrd);
      setBalance(b=>parseFloat((b-total).toFixed(2)));
      setLoading(false); setStep(4);
    },1400);
  };

  if(step===4) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"60vh",animation:"fadeIn .5s ease"}}>
      <div style={{width:86,height:86,borderRadius:"50%",background:C.gGr,display:"flex",alignItems:"center",
        justifyContent:"center",fontSize:38,marginBottom:22,boxShadow:"0 0 50px rgba(52,211,153,.4)"}}>✓</div>
      <h2 style={{fontFamily:"Syne,sans-serif",fontSize:28,fontWeight:900,color:"#34d399",marginBottom:8}}>Order Placed! 🚀</h2>
      <p style={{color:C.muted,marginBottom:6}}><strong style={{color:"#c4b5fd"}}>{sel?.name}</strong> — {qty.toLocaleString()} units</p>
      <p style={{color:C.muted,fontSize:13,marginBottom:30}}>Delivery starts: <strong style={{color:C.goldL}}>{sel?.speed}</strong></p>
      <div style={{display:"flex",gap:12}}>
        <Btn onClick={()=>setPage("orders")}>View Orders →</Btn>
        <Btn v="ghost" onClick={()=>{ setStep(1); setSel(null); setLink(""); setCoupon(""); setDisc(0); setCouponMsg(""); }}>New Order</Btn>
      </div>
    </div>
  );

  return (
    <div className="page-enter" style={{animation:"fadeIn .4s ease"}}>
      <PgH title="New Order" sub="Choose a service and grow your presence"/>

      {/* Step pills */}
      <div style={{display:"flex",gap:0,marginBottom:28,width:"fit-content",
        background:"rgba(255,255,255,.03)",borderRadius:12,padding:5,border:`1px solid ${C.border}`}}>
        {[{n:1,l:"Select Service"},{n:2,l:"Details"},{n:3,l:"Confirm"}].map((s,i)=>(
          <div key={s.n} style={{display:"flex",alignItems:"center"}}>
            <div onClick={()=>step>s.n&&setStep(s.n)} style={{display:"flex",alignItems:"center",gap:7,padding:"8px 16px",
              borderRadius:9,background:step===s.n?"rgba(124,58,237,.2)":"transparent",
              color:step>=s.n?"#c4b5fd":C.muted,fontWeight:step===s.n?700:500,fontSize:12,
              cursor:step>s.n?"pointer":"default",transition:"all .2s"}}>
              <div style={{width:20,height:20,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:10,fontWeight:900,background:step>s.n?C.gGr:step===s.n?C.gP:"rgba(255,255,255,.08)",color:"#fff"}}>{step>s.n?"✓":s.n}</div>
              <span className="hide-mob">{s.l}</span>
            </div>
            {i<2&&<div style={{width:16,height:1,background:C.border}}/>}
          </div>
        ))}
      </div>

      {/* STEP 1 */}
      {step===1&&<>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:20}}>
          {PLATFORMS.map(p=>(
            <button key={p} onClick={()=>setPf(p)} style={{background:pf===p?C.gP:"rgba(255,255,255,.04)",
              border:`1px solid ${pf===p?"transparent":C.border}`,borderRadius:8,padding:"7px 14px",
              color:pf===p?"#fff":C.muted,fontSize:12,fontWeight:600,cursor:"pointer",transition:"all .2s"}}>{p}</button>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:14}}>
          {filtered.map(svc=>(
            <div key={svc.id} onClick={()=>{ setSel(svc); setQty(svc.tiers?svc.tiers[0].qty:svc.min); setStep(2); }}
              style={{cursor:"pointer",border:`2px solid ${sel?.id===svc.id?"#7c3aed":C.border}`,
                borderRadius:13,padding:18,background:sel?.id===svc.id?"rgba(124,58,237,.08)":"rgba(255,255,255,.02)",transition:"all .2s"}}
              onMouseEnter={e=>{ e.currentTarget.style.borderColor="rgba(124,58,237,.4)"; }}
              onMouseLeave={e=>{ e.currentTarget.style.borderColor=sel?.id===svc.id?"#7c3aed":C.border; }}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                <div>
                  <div style={{fontSize:10,color:C.purpleL,fontWeight:800,letterSpacing:".07em",marginBottom:3}}>{svc.platform} · {svc.cat}</div>
                  <div style={{fontWeight:700,fontSize:14,color:"#e8e8f2"}}>{svc.name}</div>
                </div>
                <span style={{fontSize:24}}>{svc.icon}</span>
              </div>
              <p style={{color:C.muted,fontSize:12,lineHeight:1.5,marginBottom:10}}>{svc.desc}</p>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
                <span style={{color:C.muted}}>⚡ {svc.speed}</span>
                <span style={{color:C.goldL,fontWeight:800}}>
                  {svc.tiers ? "From ₹"+svc.tiers[0].price : "₹"+svc.price+"/unit"}
                </span>
              </div>
            </div>
          ))}
        </div>
      </>}

      {/* STEP 2 */}
      {step===2&&sel&&(
        <div className="order-panel" style={{display:"grid",gridTemplateColumns:"1fr 340px",gap:22}}>
          <div>
            <Card glow style={{padding:26,marginBottom:18}}>
              <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",

                <div style={{flex:1}}>

                </div>
                <button onClick={()=>setStep(1)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:12}}>✕ Change</button>
              </div>

              {sel.tiers&&(
                <div style={{background:"rgba(212,160,23,.06)",border:"1px solid rgba(212,160,23,.2)",borderRadius:11,padding:"13px 16px",marginBottom:18}}>

                    {sel.tiers.map(t=>(

              <input type="number" value={qty}
                onChange={e=>setQty(Math.max(sel.min,Math.min(sel.max,Number(e.target.value))))}

                  borderRadius:10,padding:"10px 14px",color:C.text,fontSize:14,fontWeight:700}}/>

            {/* Coupon — no codes shown, only input box */}
            <Card style={{padding:20}}>
              <div style={{fontSize:13,fontWeight:700,color:"#e8e8f2",marginBottom:12}}>🎟 Have a Discount Code?</div>
              <div style={{display:"flex",gap:10}}>
                <input value={coupon} onChange={e=>{ setCoupon(e.target.value); setCouponMsg(""); }}
                  placeholder="Enter your promo code"
                  style={{flex:1,background:"rgba(255,255,255,.04)",border:`1px solid ${C.border}`,
                    borderRadius:10,padding:"10px 14px",color:C.text,fontSize:13}}/>
                <Btn onClick={applyCoupon} v="gold" size="sm">Apply</Btn>
              </div>
              {couponMsg&&<p style={{fontSize:12,marginTop:8,color:couponMsg.startsWith("✅")?"#34d399":"#f87171",fontWeight:600}}>{couponMsg}</p>}
            </Card>
          </div>

          {/* Summary panel */}
          <div>
            <Card glow style={{padding:26,position:"sticky",top:24}}>
              <h3 style={{fontWeight:800,fontSize:16,color:"#e8e8f2",marginBottom:20}}>Order Summary</h3>
              {[
                {l:"Service",v:sel.name},
                {l:"Platform",v:sel.platform},
                {l:"Quantity",v:qty.toLocaleString()+" units"},
                {l:"Rate",v:sel.tiers ? "Tiered pricing" : "₹"+sel.price+" per unit"},
              ].map(({l,v})=>(
                <div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:11,paddingBottom:11,borderBottom:`1px solid ${C.border}`}}>
                  <span style={{color:C.muted,fontSize:12}}>{l}</span>
                  <span style={{color:"#c4b5fd",fontWeight:600,fontSize:12,textAlign:"right",maxWidth:"55%"}}>{v}</span>
                </div>
              ))}
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                <span style={{color:C.muted,fontSize:12}}>Subtotal</span>
                <span style={{color:"#e8e8f2",fontWeight:700}}>₹{raw.toFixed(2)}</span>
              </div>
              {disc>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                <span style={{color:"#34d399",fontSize:12}}>Discount ({disc}%)</span>
                <span style={{color:"#34d399",fontWeight:700}}>-₹{discAmt.toFixed(2)}</span>
              </div>}
              <div style={{background:"rgba(245,200,66,.07)",border:"1px solid rgba(245,200,66,.2)",
                borderRadius:11,padding:14,marginBottom:18,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontWeight:800,color:"#e8e8f2",fontSize:15}}>Total</span>
                <span style={{fontWeight:900,fontSize:26,background:C.gG,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>₹{total.toFixed(2)}</span>
              </div>
              <div style={{fontSize:11,color:C.muted,marginBottom:16,padding:"9px 12px",background:"rgba(255,255,255,.02)",borderRadius:8}}>
                💰 Wallet balance: <strong style={{color:total>balance?"#f87171":C.goldL}}>{fmt(balance)}</strong>
                {total>balance&&<span style={{color:"#f87171",display:"block",marginTop:3}}>⚠ Insufficient — please add funds</span>}
              </div>
              <Btn onClick={()=>{ if(!link.trim()){ setLinkErr("Please paste your link"); return; } setLinkErr(""); setStep(3); }}
                style={{width:"100%",justifyContent:"center"}} size="lg" disabled={total>balance}>
                Review Order →
              </Btn>
              <Btn v="ghost" onClick={()=>setStep(1)} style={{width:"100%",justifyContent:"center",marginTop:9}} size="sm">
                ← Back
              </Btn>
            </Card>
          </div>
        </div>
      )}

      {/* STEP 3 */}
      {step===3&&sel&&(
        <div style={{maxWidth:520,margin:"0 auto"}}>
          <Card glow style={{padding:30}}>
            <h3 style={{fontFamily:"Syne,sans-serif",fontWeight:900,fontSize:20,color:"#f0f0ff",marginBottom:20}}>Confirm Your Order</h3>
            {[
              {l:"Service",   v:sel.name,     color:"#c4b5fd"},
              {l:"Platform",  v:sel.platform},
              {l:"Link",      v:link,         color:"#60a5fa",mono:true},
              {l:"Quantity",  v:qty.toLocaleString()+" units"},
              {l:"Delivery",  v:"⚡ "+sel.speed, color:"#fbbf24"},
              {l:"Total",     v:fmt(total),   color:C.goldL, big:true},
            ].map(({l,v,color,mono,big})=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                padding:"12px 0",borderBottom:`1px solid ${C.border}`}}>
                <span style={{color:C.muted,fontSize:12,fontWeight:600,flexShrink:0}}>{l}</span>
                <span style={{color:color||"#e8e8f2",fontWeight:big?900:600,fontSize:big?22:13,
                  fontFamily:mono?"monospace":"inherit",wordBreak:"break-all",textAlign:"right",maxWidth:"58%"}}>{v}</span>
              </div>
            ))}
            <div style={{display:"flex",gap:12,marginTop:24}}>
              <Btn onClick={place} loading={loading} style={{flex:1,justifyContent:"center"}} size="lg">🚀 Place Order</Btn>
              <Btn v="ghost" onClick={()=>setStep(2)} style={{flex:1,justifyContent:"center"}}>← Edit</Btn>
            </div>
          </Card>
        </div>
      )}
    </div>
  );
};

// ─── User: My Orders ──────────────────────────────────────────
const UserOrders = ({ orders, setOrders, userEmail="" }) => {
  const cancel=async(id)=>{
    if(!window.confirm("Cancel this order?")) return;
    DB.updateOrder(id,"Cancelled");
    Toast.info("Order cancellation requested...");
    setTimeout(async()=>{
      const all = await DB.getOrdersFromFirebase();
      const norm = (userEmail||"").toLowerCase().trim();
      setOrders(all.filter(o=>(o.userEmail||"").toLowerCase().trim()===norm));
    }, 1500);
  };
  const [view,setView]=useState("cards");
  const [filter,setFilter]=useState("All");
  const [search,setSearch]=useState("");
  const filtered=(filter==="All"?orders:orders.filter(o=>o.status===filter))
    .filter(o=>!search||o.service?.toLowerCase().includes(search.toLowerCase())||o.id?.toLowerCase().includes(search.toLowerCase()));
  const pctMap={"Pending":5,"Processing":60,"Completed":100,"Cancelled":0,"Refunded":0};
  const colMap={"Pending":"#f59e0b","Processing":"#3b82f6","Completed":"#10b981","Cancelled":"#ef4444","Refunded":"#a855f7"};

  const doRefill=function(o){
    // 15-day check
    var orderDate = o.date ? new Date(o.date) : null;
    if(orderDate){
      var daysDiff = Math.floor((Date.now() - orderDate.getTime()) / (1000*60*60*24));
      if(daysDiff < 15){
        var daysLeft = 15 - daysDiff;
        Toast.info("Refill available after "+daysLeft+" more day"+(daysLeft===1?"":"s")+" (15 days from order date)");
        return;
      }
    }
    var reason=prompt("Refill reason? (e.g. followers dropped)");
    if(!reason||!reason.trim()){return;}
    getFS().then(function(fs){
      if(!fs){Toast.error("Connection error");return;}
      fs.collection("refillRequests").add({
        orderId:o.id||"",
        service:o.service||"",
        userEmail:userEmail||"",
        qty:o.qty||0,
        date:today(),
        ts:Date.now(),
        status:"pending",
        reason:reason.trim()
      }).then(function(){
        Toast.success("Refill submitted! Admin will process within 24hrs.");
      }).catch(function(err){
        console.error("Refill error:",err);
        Toast.error("Failed: "+err.message);
      });
    }).catch(function(){
      Toast.error("Connection error. Try again.");
    });
  };

  return (
    <div className="page-enter" style={{animation:"fadeIn .4s ease"}}>
      <PgH title="My Orders" sub={`${orders.length} total`}
        action={
          <div style={{display:"flex",background:"rgba(255,255,255,.04)",borderRadius:9,padding:3,border:`1px solid ${C.border}`}}>
            {[{v:"cards",i:"⊞"},{v:"table",i:"≡"}].map(b=>(
              <button key={b.v} onClick={()=>setView(b.v)} style={{padding:"7px 14px",borderRadius:7,border:"none",
                background:view===b.v?"rgba(124,58,237,.25)":"transparent",
                color:view===b.v?"#c4b5fd":C.muted,cursor:"pointer",fontSize:15,fontWeight:700}}>{b.i}</button>
            ))}
          </div>
        }/>
      <div style={{display:"flex",gap:7,marginBottom:20,flexWrap:"wrap"}}>
        {["All","Pending","Processing","Completed","Cancelled"].map(s=>(
          <button key={s} onClick={()=>setFilter(s)} style={{padding:"6px 14px",borderRadius:20,border:"none",
            background:filter===s?C.gP:"rgba(255,255,255,.05)",
            color:filter===s?"#fff":C.muted,fontSize:12,fontWeight:600,cursor:"pointer"}}>
            {s}{s!=="All"&&<span style={{opacity:.7}}> ({orders.filter(o=>o.status===s).length})</span>}
          </button>
        ))}
      </div>
      {filtered.length===0&&(
        <Card style={{padding:50,textAlign:"center"}}>
          <div style={{fontSize:44,marginBottom:12}}>📭</div>
          <p style={{color:C.muted}}>No {filter!=="All"?filter.toLowerCase():""} orders yet</p>
        </Card>
      )}
      {view==="cards"&&filtered.map(o=>{
        const pct=pctMap[o.status]||0;
        const col=colMap[o.status]||"#6b7280";
        return (
          <Card key={o.id} style={{padding:22,marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,flexWrap:"wrap",gap:10}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:46,height:46,borderRadius:12,background:"rgba(124,58,237,.12)",
                  display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{o.icon}</div>
                <div>
                  <div style={{fontWeight:800,color:"#c4b5fd",fontSize:14,marginBottom:3}}>{o.service}</div>
                  <div style={{fontSize:11,color:C.muted}}>{o.platform} · {o.qty.toLocaleString()} units · {o.date}</div>
                  <div style={{fontSize:10,color:C.muted,fontFamily:"monospace",marginTop:2}}>{o.id}</div>
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
                <Badge s={o.status}/>
                <div style={{fontWeight:900,color:C.goldL,fontSize:18}}>{fmt(o.price)}</div>
              </div>
            </div>
            {o.status!=="Cancelled"&&o.status!=="Refunded"&&(
              <div style={{marginBottom:14}}>
                {/* Progress bar */}
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:6}}>
                  <span style={{color:C.muted,fontSize:10}}>Delivery Progress</span>
                  <span style={{color:col,fontWeight:800,fontSize:11}}>{pct}%</span>
                </div>
                <div style={{height:7,background:"rgba(255,255,255,.06)",borderRadius:10,overflow:"hidden",marginBottom:10}}>
                  <div style={{height:"100%",width:`${pct}%`,borderRadius:10,
                    background:`linear-gradient(90deg,${col},${col}bb)`,
                    boxShadow:`0 0 8px ${col}55`,transition:"width 1.4s ease"}}/>
                </div>
                {/* Step tracker */}
                <div style={{display:"flex",alignItems:"center",gap:0}}>
                  {[
                    {label:"Placed",   done:true,            icon:"✓"},
                    {label:"Verified", done:pct>=30,         icon:"✓"},
                    {label:"Running",  done:pct>=60,         icon:"⚡"},
                    {label:"Done",     done:pct>=100,        icon:"🎉"},
                  ].map((step,si)=>(
                    <React.Fragment key={step.label}>
                      <div style={{display:"flex",flexDirection:"column",alignItems:"center",flex:si<3?undefined:undefined}}>
                        <div style={{width:22,height:22,borderRadius:"50%",
                          background:step.done?col:"rgba(255,255,255,.07)",
                          display:"flex",alignItems:"center",justifyContent:"center",
                          fontSize:9,fontWeight:900,color:step.done?"#fff":C.muted,
                          border:`2px solid ${step.done?col:"rgba(255,255,255,.12)"}`,
                          transition:"all .4s",
                          boxShadow:step.done?`0 0 8px ${col}55`:"none"}}>
                          {step.done?step.icon:si+1}
                        </div>
                        <span style={{fontSize:8,color:step.done?col:C.muted,marginTop:3,fontWeight:step.done?700:400,whiteSpace:"nowrap"}}>{step.label}</span>
                      </div>
                      {si<3&&<div style={{flex:1,height:2,background:pct>=((si+1)*25)?col:"rgba(255,255,255,.07)",margin:"0 3px",marginBottom:16,transition:"background .4s"}}/>}
                    </React.Fragment>
                  ))}
                </div>
              </div>
            )}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              padding:"9px 12px",background:"rgba(255,255,255,.02)",borderRadius:9,flexWrap:"wrap",gap:8}}>
              <span style={{fontSize:11,color:"#60a5fa",fontFamily:"monospace",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"55%"}}>🔗 {o.link||"—"}</span>
              <div style={{display:"flex",gap:7}}>
                {o.status==="Pending"&&<button onClick={()=>cancel(o.id)} style={{background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.3)",borderRadius:7,padding:"5px 11px",color:"#f87171",fontSize:11,fontWeight:700,cursor:"pointer"}}>✕ Cancel</button>}
                {o.status==="Completed"&&<button onClick={()=>setPage("neworder")} style={{background:"rgba(16,185,129,.08)",border:"1px solid rgba(16,185,129,.25)",borderRadius:7,padding:"5px 11px",color:"#34d399",fontSize:11,fontWeight:700,cursor:"pointer"}}>🔁 Reorder</button>}
                {o.status==="Completed"&&<div>
                  <button onClick={()=>doRefill(o)} style={{background:"rgba(96,165,250,.08)",border:"1px solid rgba(96,165,250,.25)",borderRadius:7,padding:"5px 11px",color:"#60a5fa",fontSize:11,fontWeight:700,cursor:"pointer"}}>Refill</button>
                  <div style={{fontSize:9,color:"rgba(255,255,255,0.35)",marginTop:3,textAlign:"center"}}>Available after 15 days</div>
                </div>}
                <button onClick={()=>window.open(`https://wa.me/${WHATSAPP_NUM}?text=Hi, I need help with order ${o.id} - ${o.service}`,"_blank")} style={{background:"rgba(124,58,237,.08)",border:"1px solid rgba(124,58,237,.25)",borderRadius:7,padding:"5px 11px",color:"#c4b5fd",fontSize:11,fontWeight:700,cursor:"pointer"}}>💬 Help</button>
              </div>
            </div>
          </Card>
        );
      })}
      {view==="table"&&filtered.length>0&&<Card style={{padding:22}}><OTable orders={filtered} onCancel={cancel}/></Card>}
    </div>
  );
};

// ─── User: Wallet ─────────────────────────────────────────────
const UserWallet = ({ balance, txns=[], userEmail="" }) => {
  const [myDeps,setMyDeps]=useState([]);
  const [myTxns,setMyTxns]=useState([]);
  const [walletTab,setWalletTab]=useState("deposits");
  const [txnLoading,setTxnLoading]=useState(true);

  useEffect(()=>{
    let mounted = true;
    const loadDeps = ()=>{
      DB.getDepositRequestsFromFirebase().then(all=>{
        if(!mounted) return;
        const myEmail = (userEmail||"").toLowerCase().trim();
        setMyDeps(all.filter(d=> d.email === myEmail));
      });
    };
    const loadTxns = async()=>{
      try{
        const fs=await getFS(); if(!fs){setTxnLoading(false);return;}
        const snap=await fs.collection("transactions")
          .where("email","==",userEmail.toLowerCase().trim())
          .get();
        if(mounted){
          const list=snap.docs.map(d=>d.data()).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
          setMyTxns(list); setTxnLoading(false);
        }
      }catch(e){ if(mounted) setTxnLoading(false); }
    };
    loadDeps();
    loadTxns();
    const iv = setInterval(loadDeps, 5000);
    return ()=>{ mounted=false; clearInterval(iv); };
  },[userEmail]);

  const depStatusColor={pending:"#fbbf24",approved:"#34d399",rejected:"#f87171"};
  const depStatusLabel={pending:"⏳ Pending",approved:"✅ Approved",rejected:"❌ Rejected"};

  return (
  <div className="page-enter" style={{animation:"fadeIn .4s ease"}}>
    <PgH title="Wallet" sub="Balance & transaction history"/>
    <div className="stat-grid" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:24}}>
      <StatCard icon="◈" label="Current Balance"  value={fmt(balance)} grad={C.gG}/>
      <StatCard icon="⬆" label="Total Deposited"  value={fmt(myDeps.filter(d=>d.status==="approved").reduce((s,d)=>s+Number(d.amount||0),0))} grad={C.gP}/>
      <StatCard icon="📥" label="Pending Deposits" value={fmt(myDeps.filter(d=>d.status==="pending").reduce((s,d)=>s+Number(d.amount||0),0))} grad={C.gB}/>
      <StatCard icon="📋" label="Total Deposits"   value={myDeps.length} grad={C.gGr}/>
    </div>
    <Card style={{padding:22}}>
      {/* Tab switcher */}
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[["deposits","📥 Deposits"],["txns","💳 Transactions"],["history","📊 History"]].map(([t,l])=>(
          <button key={t} onClick={()=>setWalletTab(t)}
            style={{padding:"7px 16px",borderRadius:20,fontSize:12,fontWeight:700,cursor:"pointer",
              background:walletTab===t?C.gP:"rgba(255,255,255,.06)",
              border:"1px solid "+(walletTab===t?"rgba(124,58,237,.6)":C.border),
              color:walletTab===t?"#fff":C.muted}}>{l}</button>
        ))}
      </div>
      {walletTab==="deposits"&&(
        <div>
          {myDeps.length===0?<div style={{textAlign:"center",color:C.muted,padding:36,fontSize:13}}>
            <div style={{fontSize:40,marginBottom:10}}>📭</div>
            <div style={{fontWeight:700,color:"#e8e8f2",marginBottom:6}}>No deposits yet</div>
            <div>Add funds and your requests will appear here.</div>
          </div>:
          myDeps.map(d=>(
            <div key={d.id} style={{background:"rgba(255,255,255,.03)",border:"1px solid "+C.border,borderRadius:10,padding:"12px 14px",marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontWeight:800,color:C.goldL,fontSize:15}}>₹{d.amount}</span>
                <span style={{fontSize:11,fontWeight:700,color:depStatusColor[d.status]||C.muted,
                  background:"rgba(255,255,255,.06)",padding:"3px 10px",borderRadius:20}}>
                  {depStatusLabel[d.status]||d.status}
                </span>
              </div>
              <div style={{fontSize:11,color:C.muted,marginBottom:4}}>UTR: <span style={{color:"#c4b5fd",fontFamily:"monospace"}}>{d.utr}</span></div>
              <div style={{fontSize:11,color:C.muted,marginBottom:4}}>{d.date} · {d.method||"UPI"}</div>
              {d.screenshot&&(
                <div style={{marginBottom:6}}>
                  <img src={d.screenshot} alt="proof"
                    style={{maxWidth:180,maxHeight:100,objectFit:"contain",borderRadius:8,border:`1px solid ${C.border}`,background:"rgba(0,0,0,.3)",cursor:"pointer"}}
                    onClick={()=>window.open(d.screenshot,"_blank")}/>
                  <div style={{fontSize:9,color:C.muted,marginTop:2}}>🔍 Tap to enlarge</div>
                </div>
              )}
              {d.status==="pending"&&<div style={{marginTop:4,fontSize:11,color:"#fbbf24"}}>⏳ Admin will verify within 30 minutes</div>}
              {d.status==="approved"&&<div style={{marginTop:4,fontSize:11,color:"#34d399"}}>✅ Funds added to your wallet!</div>}
              {d.status==="rejected"&&<div style={{marginTop:4,fontSize:11,color:"#f87171"}}>❌ Rejected. Contact support if this is wrong.</div>}
            </div>
          ))}
        </div>
      )}
      {walletTab==="txns"&&(
        txnLoading?<CardSkel/>:
        myTxns.length===0?<div style={{textAlign:"center",color:C.muted,padding:30,fontSize:13}}>
          <div style={{fontSize:36,marginBottom:8}}>📊</div>No transactions yet
        </div>:
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{borderBottom:`1px solid ${C.border}`}}>
            {["ID","Type","Amount","Date"].map(h=><th key={h} style={{padding:"9px 12px",textAlign:"left",color:C.muted,fontWeight:700,fontSize:10,letterSpacing:".05em"}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {myTxns.map((t,i)=>(
              <tr key={t.id||i} style={{borderBottom:`1px solid rgba(255,255,255,.04)`,background:i%2?"rgba(255,255,255,.01)":"transparent"}}>
                <td style={{padding:"11px 12px",color:C.purpleL,fontFamily:"monospace",fontWeight:700,fontSize:11}}>{t.id}</td>
                <td style={{padding:"11px 12px",color:"#c4b5fd"}}>{t.type}</td>
                <td style={{padding:"11px 12px",fontWeight:800,fontSize:13,color:(t.amount||0)>0?"#34d399":"#f87171"}}>{(t.amount||0)>0?"+":""}{fmt(Math.abs(t.amount||0))}</td>
                <td style={{padding:"11px 12px",color:C.muted}}>{t.date}</td>
              </tr>
            ))}
          </tbody>
        </table>
      )}

// ─── QR Code Display (client-side, no external image API) ────
const QRDisplay = ({ upiId, upiName, amount }) => {
  const ref = React.useRef(null);
  React.useEffect(()=>{
    if(!ref.current) return;
    ref.current.innerHTML = "";
    const upiLink = `upi://pay?pa=${upiId}&pn=${encodeURIComponent(upiName)}&am=${amount}&cu=INR&tn=OpulentSMM`;
    try {
      new QRCode(ref.current, {
        text: upiLink,
        width: 200,
        height: 200,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.M
      });
    } catch(e) {
      // fallback to image API
      const img = document.createElement('img');
      img.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upiLink)}`;
      img.style.width = '200px';
      img.style.height = '200px';
      ref.current.appendChild(img);
    }
  }, [upiId, amount]);
  return (
    <div style={{textAlign:"center",marginBottom:14}}>
      <p style={{color:"#c4b5fd",fontSize:12,fontWeight:600,marginBottom:10}}>📷 Step 1: Scan QR or copy UPI ID below</p>
      <div style={{display:"inline-block",background:"#fff",padding:10,borderRadius:12,lineHeight:0}}>
        <div ref={ref}/>
      </div>
    </div>
  );
};

// ─── UTR Payment Screen ───────────────────────────────────────
const PaymentUTRScreen = ({ amount, method, qrUrl, userName, userEmail, onBack, onSubmitted }) => {
  const [utr,setUtr]=useState("");
  const [screenshot,setScreenshot]=useState(null); // base64 string
  const [screenshotName,setScreenshotName]=useState("");
  const [submitting,setSubmitting]=useState(false);
  const [err,setErr]=useState("");
  const [submitted,setSubmitted]=useState(false);
  const fileRef=useRef(null);

  // Convert image file to base64
  const handleScreenshot=(e)=>{
    const file=e.target.files[0];
    if(!file) return;
    if(file.size > 1.5*1024*1024){ setErr("Screenshot must be under 1.5 MB. Please compress or crop it."); return; }
    if(!file.type.startsWith("image/")){ setErr("Only image files are allowed (JPG, PNG, etc.)"); return; }
    const reader=new FileReader();
    reader.onload=(ev)=>{
      setScreenshot(ev.target.result);
      setScreenshotName(file.name);
      setErr("");
    };
    reader.readAsDataURL(file);
  };

  const submitUTR = async () => {
    const u = utr.trim();
    if(!u){ setErr("Please enter your UTR / Transaction ID"); return; }
    if(u.length < 10 || u.length > 16){ setErr("UTR must be 10–16 characters. Check your payment app for the correct reference number."); return; }
    if(!/^[A-Za-z0-9]+$/.test(u)){ setErr("UTR must contain only letters and numbers."); return; }
    if(!screenshot){ setErr("Please upload your payment screenshot. Admin needs it to verify your payment."); return; }
    setSubmitting(true); setErr("");
    // 🛡️ Anti-spam: 5-minute cooldown per user
    const cooldownKey = "nx_dep_ts_" + (userEmail||"").replace(/[@.]/g,"_");
    const lastDep = parseInt(sessionStorage.getItem(cooldownKey)||"0");
    if(Date.now() - lastDep < 5*60*1000){
      setSubmitting(false);
      const wait = Math.ceil((5*60*1000-(Date.now()-lastDep))/60000);
      setErr(`⏳ Please wait ${wait} more minute${wait!==1?"s":""} before submitting another deposit.`);
      return;
    }
    // 🛡️ Duplicate UTR fraud detection
    const alreadyUsed = await UTRGuard.isUsed(u);
    if(alreadyUsed){
      setSubmitting(false);
      setErr("❌ This UTR has already been used. Each transaction can only be submitted once. Contact support if this is an error.");
      return;
    }
    const req = {
      id: "DEP-"+Date.now(),
      email: (userEmail||"").toLowerCase().trim(),
      userName: userName,
      amount: parseFloat(amount),
      utr: u,
      screenshot: screenshot, // base64 stored in Firestore
      method: method,
      status: "pending",
      date: new Date().toISOString().slice(0,10),
      createdAt: Date.now(),
    };
    try {
      await DB.addDepositRequest(req);
      setSubmitting(false);
      setSubmitted(true);
      const cooldownKey2 = "nx_dep_ts_" + (userEmail||"").replace(/[@.]/g,"_");
      sessionStorage.setItem(cooldownKey2, String(Date.now()));
    } catch(e) {
      setSubmitting(false);
      console.error("Submit UTR failed:", e);
      setErr("❌ " + (e.message || "Failed to submit. Check internet connection."));
    }
  };

  if(submitted) return (

      <PgH title="Request Submitted!" sub="Waiting for admin approval"/>

        <h3 style={{fontFamily:"Syne,sans-serif",fontWeight:900,color:"#34d399",fontSize:20,marginBottom:8}}>
          Payment Request Sent!
        </h3>
        <p style={{color:C.muted,fontSize:13,lineHeight:1.6,marginBottom:20}}>
          Your deposit request of <strong style={{color:C.goldL}}>₹{amount}</strong> has been submitted.<br/>
          Admin will verify your UTR and add funds within <strong style={{color:"#f0f0ff"}}>30 minutes</strong>.
        </p>
        <div style={{background:"rgba(255,255,255,.04)",borderRadius:10,padding:"12px 16px",marginBottom:20,textAlign:"left"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{color:C.muted,fontSize:12}}>Amount</span>
            <span style={{color:C.goldL,fontWeight:800}}>₹{amount}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{color:C.muted,fontSize:12}}>UTR / Txn ID</span>
            <span style={{color:"#c4b5fd",fontWeight:700,fontSize:12}}>{utr}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <span style={{color:C.muted,fontSize:12}}>Status</span>

          </div>
        </div>
        <Btn v="primary" onClick={onSubmitted} style={{justifyContent:"center",width:"100%"}}>Go to Wallet</Btn>
      </Card>
    </div>
  );

  return (

                <div style={{width:20,height:20,borderRadius:"50%",
                  background:i===1||i===2?C.gP:"rgba(255,255,255,.1)",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:10,fontWeight:800,color:"#fff"}}>{i===0?"✓":i+1}</div>

        <QRDisplay upiId={UPI_ID} upiName={UPI_NAME} amount={amount}/>

        {/* UPI ID copy */}
        <div style={{background:"rgba(255,255,255,.04)",borderRadius:10,padding:"10px 14px",marginBottom:16,
          display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:10,color:C.muted,marginBottom:2,textTransform:"uppercase",letterSpacing:".06em"}}>UPI ID</div>

  const [sort,setSort]=useState("popular");
  const [search,setSearch]=useState("");
  const [showFilters,setShowFilters]=useState(false);

  const toggleQuality=(q)=>setQuality(prev=>prev.includes(q)?prev.filter(x=>x!==q):[...prev,q]);

  const getMinPrice=(s)=> s.tiers?s.tiers[0].price:(s.price||0)*100;

  const filtered = SERVICES.filter(s=>{
    if(pf!=="All" && s.platform!==pf) return false;
    if(cat!=="All" && s.cat!==cat) return false;
    if(speedF!=="All" && s.speedTag!==speedF) return false;
    if(quality.length>0 && !quality.every(q=>(s.quality||[]).includes(q))) return false;
    if(search && !s.name.toLowerCase().includes(search.toLowerCase()) && !s.platform.toLowerCase().includes(search.toLowerCase()) && !s.cat.toLowerCase().includes(search.toLowerCase())) return false;
    if(priceRange!=="All"){
      const p=getMinPrice(s);
      if(priceRange==="<50"  && p>=50)  return false;
      if(priceRange==="50-200" && (p<50||p>200)) return false;
      if(priceRange==="200-500" && (p<200||p>500)) return false;
      if(priceRange===">500" && p<=500) return false;
    }
    return true;

    if(sort==="price_low")  return getMinPrice(a)-getMinPrice(b);
    if(sort==="price_high") return getMinPrice(b)-getMinPrice(a);
    return (b.badge?1:0)-(a.badge?1:0);

// ─── User: Support ────────────────────────────────────────────
const UserSupport = ({ userEmail="", userName="" }) => {
  const [tab,setTab]=useState("tickets");
  const [tickets,setTickets]=useState([]);
  const [loading,setLoading]=useState(true);
  const [form,setForm]=useState({subject:"",category:"Order Issue",message:""});
  const [submitting,setSubmitting]=useState(false);
  const [viewTicket,setViewTicket]=useState(null);
  const [reply,setReply]=useState("");
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));
  const CATS=["Order Issue","Payment Issue","Refill Request","Service Problem","General Query"];

  const loadTickets=async()=>{
    setLoading(true);
    try{
      const fs=await getFS(); if(!fs){setLoading(false);return;}
      const snap=await fs.collection("tickets")
        .where("userEmail","==",userEmail.toLowerCase().trim())
        .get();
      const list=snap.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
      setTickets(list);
    }catch(e){console.error(e);}
    setLoading(false);
  };

  useEffect(()=>{ if(userEmail) loadTickets(); },[userEmail]);

  const submit=async()=>{
    if(!form.subject.trim()||!form.message.trim()){Toast.error("Please fill subject and message");return;}
    setSubmitting(true);
    try{
      const fs=await getFS(); if(!fs) throw new Error("No connection");
      const tid="TKT-"+Date.now();
      await fs.collection("tickets").doc(tid).set({
        id:tid, userEmail:userEmail.toLowerCase().trim(), userName,
        subject:sanitize(form.subject), category:form.category,
        message:sanitize(form.message),
        status:"Open", createdAt:Date.now(), date:today(),
        replies:[]
      });
      setForm({subject:"",category:"Order Issue",message:""});
      Toast.success("✅ Ticket submitted! We'll reply within 1 hour.");
      loadTickets(); setTab("tickets");
    }catch(e){Toast.error("Failed: "+e.message);}
    setSubmitting(false);
  };

  const sendReply=async()=>{
    if(!reply.trim()||!viewTicket) return;
    try{
      const fs=await getFS(); if(!fs) return;
      const newReplies=[...(viewTicket.replies||[]),{from:"user",text:sanitize(reply),ts:Date.now()}];
      await fs.collection("tickets").doc(viewTicket.id).update({replies:newReplies,status:"Awaiting Reply"});
      setViewTicket({...viewTicket,replies:newReplies});
      setReply(""); Toast.success("Reply sent!");
      loadTickets();
    }catch(e){Toast.error("Failed: "+e.message);}
  };

  const statCol={Open:"#60a5fa","Awaiting Reply":"#fbbf24",Resolved:"#34d399",Closed:"#6b7280"};

  return (
    <div className="page-enter" style={{animation:"fadeIn .4s ease"}}>
      <PgH title="Support Center" sub="Get help with orders, payments and more"
        action={<Btn onClick={()=>setTab("new")}>+ New Ticket</Btn>}/>

const UserInfluencer = ({ userEmail="", userName="" }) => {
  const [tab,setTab]=useState("submit");
  const [submissions,setSubmissions]=useState([]);
  const [loading,setLoading]=useState(true);
  const [form,setForm]=useState({type:"Instagram Story",link:"",followers:"",notes:""});
  const [proofImg,setProofImg]=useState(null);
  const [proofName,setProofName]=useState("");
  const [submitting,setSubmitting]=useState(false);
  const [refStats,setRefStats]=useState({total:0,active:0,totalDeposit:0});
  const fileRef=useRef(null);
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));

  // Referral code for this user
  const refCode=React.useMemo(()=>`OPULENT-${((userName||"USER").slice(0,4)).toUpperCase()}${(userEmail.charCodeAt(0)*37+userEmail.length*13+1000)%9000+1000}`,[userEmail,userName]);
  const refURL='https://opulentsmm.in?ref='+refCode.toLowerCase();

  const handleProofImg=(e)=>{
    const file=e.target.files[0]; if(!file) return;
    if(file.size > 1.5*1024*1024){ Toast.error("Screenshot must be under 1.5 MB"); return; }
    if(!file.type.startsWith("image/")){ Toast.error("Only image files allowed"); return; }
    const reader=new FileReader();
    reader.onload=(ev)=>{ setProofImg(ev.target.result); setProofName(file.name); };
    reader.readAsDataURL(file);
  };

  const load=async()=>{
    setLoading(true);
    try{
      const fs=await getFS(); if(!fs){setLoading(false);return;}
      // Load submissions
      const snap=await fs.collection("influencers")
        .where("userEmail","==",userEmail.toLowerCase().trim()).get();
      setSubmissions(snap.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)));
      // Load referral stats
      const rSnap=await fs.collection("referrals")
        .where("referralCode","==",refCode.toLowerCase()).get().catch(()=>({docs:[]}));
      const allRefs=rSnap.docs.map(d=>d.data());
      setRefStats({
        total:allRefs.length,
        active:allRefs.filter(r=>r.isActive===true).length,
        totalDeposit:allRefs.reduce((s,r)=>s+(r.totalDeposit||0),0),
      });
    }catch(e){console.error(e);}
    setLoading(false);
  };

  useEffect(()=>{ if(userEmail) load(); },[userEmail]);

  const submit=async()=>{
    if(!form.link.trim()){Toast.error("Please enter your proof link");return;}
    if(!form.followers||isNaN(form.followers)){Toast.error("Enter your follower count");return;}
    if(!proofImg){Toast.error("Please upload a screenshot proof");return;}
    setSubmitting(true);
    try{
      const fs=await getFS(); if(!fs) throw new Error("No connection");
      // Anti-duplicate: check no pending/approved submission exists
      const existing=await fs.collection("influencers")
        .where("userEmail","==",userEmail.toLowerCase().trim())
        .where("status","in",["Pending","Approved"]).get();
      if(!existing.empty){
        Toast.error("You already have a pending or approved submission.");
        setSubmitting(false); return;
      }
      const id="INF-"+Date.now();
      const followers=parseInt(form.followers)||0;
      const qualifiedLevel=getInfluencerLevel(followers, refStats.active);
      await fs.collection("influencers").doc(id).set({
        id, userEmail:userEmail.toLowerCase().trim(), userName,
        type:form.type, link:sanitize(form.link),
        followers, notes:sanitize(form.notes),
        proofScreenshot: proofImg||null,
        referralCode: refCode.toLowerCase(),
        activeUsers:  refStats.active,
        totalReferrals: refStats.total,
        level:       qualifiedLevel ? qualifiedLevel.level  : "Unqualified",
        reward:      qualifiedLevel ? qualifiedLevel.reward : "No reward yet",
        rewardQty:   qualifiedLevel ? qualifiedLevel.rewardQty : 0,
        status:"Pending", createdAt:Date.now(), date:today()
      });
      setForm({type:"Instagram Story",link:"",followers:"",notes:""});
      setProofImg(null); setProofName("");
      Toast.success("✅ Promotion proof submitted! Admin will review within 24 hours.");
      load(); setTab("history");
    }catch(e){Toast.error("Failed: "+e.message);}
    setSubmitting(false);
  };

  const myLevel=submissions.find(s=>s.status==="Approved");
  const levelInfo=myLevel?INFLUENCER_LEVELS.find(l=>l.level===myLevel.level)||INFLUENCER_LEVELS[0]:null;
  const statCol={Pending:"#fbbf24",Approved:"#34d399",Rejected:"#f87171"};

  // Progress to next level
  const currentFollowers=myLevel?parseInt(myLevel.followers||0):0;
  const nextLevel=getNextInfluencerLevel(currentFollowers, refStats.active);
  const progFollowers=nextLevel?Math.min(100,Math.round((currentFollowers/nextLevel.minFollowers)*100)):100;
  const progActive=nextLevel?Math.min(100,Math.round((refStats.active/nextLevel.minActiveUsers)*100)):100;

  return (
    <div className="page-enter" style={{animation:"fadeIn .4s ease"}}>
      <PgH title="Influencer Program" sub="Promote OpulentSMM and earn free services!"/>

      <Card style={{padding:22,marginBottom:16,border:"1px solid rgba(124,58,237,.25)",background:"rgba(124,58,237,.04)"}}>
        {/* Referral Link */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:".07em",marginBottom:8,textTransform:"uppercase"}}>🔗 Your Referral URL</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <input readOnly value={refURL}
              style={{flex:1,minWidth:180,background:"rgba(255,255,255,.04)",border:"1px solid rgba(212,160,23,.3)",
                borderRadius:9,padding:"9px 12px",color:"#c4b5fd",fontSize:11,fontFamily:"monospace",
                overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}/>
            <button onClick={function(){ navigator.clipboard&&navigator.clipboard.writeText(refURL); Toast.success("Referral URL copied!"); }}
              style={{padding:"9px 16px",background:"rgba(212,160,23,.15)",border:"1px solid rgba(212,160,23,.3)",
                borderRadius:9,color:"#f5c842",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
              📋 Copy
            </button>
          </div>
          <div style={{fontSize:11,color:C.muted,marginTop:6}}>
            Share this link. Only users who deposit ₹{ACTIVE_USER_MIN_DEPOSIT}+ or place ≥1 order count as <strong style={{color:"#34d399"}}>active</strong>.
          </div>
        </div>

        {/* Stats row */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:10,marginBottom:16}}>
          {[
            {l:"Total Referred", v:refStats.total,                        c:"#c4b5fd", icon:"👥"},
            {l:"Active Users",   v:refStats.active,                       c:"#34d399", icon:"✅", hi:true},
            {l:"Deposits ₹",    v:refStats.totalDeposit.toFixed(0),      c:"#f5c842", icon:"💰"},
          ].map(s=>(
            <div key={s.l} style={{background:s.hi?"rgba(52,211,153,.08)":"rgba(255,255,255,.04)",
              border:`1px solid ${s.hi?"rgba(52,211,153,.25)":"rgba(255,255,255,.07)"}`,
              borderRadius:11,padding:"12px 10px",textAlign:"center"}}>
              <div style={{fontSize:9,color:C.muted,letterSpacing:".06em",marginBottom:5,textTransform:"uppercase"}}>{s.icon} {s.l}</div>
              <div style={{fontSize:22,fontWeight:900,color:s.c,fontFamily:"Syne,sans-serif"}}>{s.v}</div>
            </div>
          ))}
        </div>

        {/* Progress to next level */}

const AdminLogin = ({ onAdminLogin, goBack }) => {
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const [attempts,setAttempts]=useState(0);

    setErr("");
    if(!email||!pass){ setErr("Please enter both email and password"); return; }
    if(attempts>=5){ setErr("Too many failed attempts. Please wait and try again."); return; }
    setLoading(true);
    try {
      const auth = await getFirebaseAuth();
      if(!auth){ setLoading(false); setErr("Auth service unavailable."); return; }
      const cred = await auth.signInWithEmailAndPassword(email.trim(), pass);
      setLoading(false);
      // Only grant admin if this is the admin email — password checked by Firebase
      if(cred.user.email.toLowerCase().trim() === ADMIN_EMAIL.toLowerCase()) {
        onAdminLogin();
      } else {
        // Sign them out — they logged in as a customer, not admin
        await auth.signOut();
        setAttempts(a=>a+1);
        setErr("This account does not have admin access.");
        setPass("");
      }
    } catch(e) {
      setLoading(false);
      setAttempts(a=>a+1);
      const left = 5-(attempts+1);
      if(e.code==="auth/user-not-found"||e.code==="auth/wrong-password"||e.code==="auth/invalid-credential")
        setErr(`Wrong email or password. ${left} attempt${left!==1?"s":""} remaining.`);
      else if(e.code==="auth/too-many-requests")
        setErr("Too many attempts. Firebase has temporarily blocked this. Wait a few minutes.");
      else setErr("Login failed: " + (e.message||"Unknown error"));
      setPass("");
    }
  };

  return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyCo
