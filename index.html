const ToastContainer = () => {
  const [toasts,setToasts] = useState([]);
  useEffect(()=>{
    const unsub = Toast.on(t=>{
      setToasts(p=>[...p,t]);
      setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==t.id)),t.dur||3500);
    });
    return unsub;
  },[]);
  const cols = {success:"#34d399",error:"#f87171",info:"#60a5fa",warning:"#fbbf24"};
  return h('div',{style:{position:"fixed",top:20,right:20,zIndex:9999,display:"flex",flexDirection:"column",gap:10,maxWidth:340,pointerEvents:"none"}},

// ─── Signup ───────────────────────────────────────────
const Signup = ({goLogin,onSuccess}) => {
  const [form,setForm] = useState({name:"",email:"",password:"",confirm:""});
  const [errs,setErrs] = useState({});
  const [loading,setLoading] = useState(false);
  const [done,setDone] = useState(false);
  const [errMsg,setErrMsg] = useState("");
  const F = (k,v) => setForm(f=>({...f,[k]:v}));

  const validate = () => {
    const e={};
    if(!form.name.trim()) e.name="Full name required";
    if(!form.email.includes("@")) e.email="Enter valid email";
    if(form.password.length<6) e.password="Min 6 characters";
    if(form.password!==form.confirm) e.confirm="Passwords don't match";
    setErrs(e); return !Object.keys(e).length;
  };

  const handleSignup = async() => {
    if(!validate()) return;
    setErrMsg(""); setLoading(true);
    try {
      const auth = await getFirebaseAuth();
      const cred = await auth.createUserWithEmailAndPassword(form.email, form.password);
      await cred.user.sendEmailVerification();
      const ref = getReferral();
      DB.addUser({id:"USR-"+Date.now(),name:form.name,email:form.email,
        balance:0,orders:0,joined:today(),status:"Active",referral:ref,referredBy:ref});
      if(ref) clearReferral();
      setLoading(false); setDone(true);
    } catch(e) {
      setLoading(false);
      if(e.code==="auth/email-already-in-use") setErrMsg("Email already registered. Please log in.");
      else if(e.code==="auth/weak-password") setErrMsg("Password too weak. Min 6 characters.");
      else setErrMsg("Error: "+(e.message||"Unknown"));
    }
  };

  return h(AuthWrap,null,
    h('div',{style:{textAlign:"center",marginBottom:28}},
      h(Logo),
      h('h2',{style:{fontFamily:"Syne,sans-serif",fontSize:24,fontWeight:900,color:"#f0f0ff",marginTop:20,marginBottom:5}},
        done ? "Check Your Email 📧" : "Create Account"),
      h('p',{style:{color:C.muted,fontSize:13}},
        done ? "Click the verification link we sent you." : "Start growing your social media today")
    ),
    h(Card,{style:{padding:"32px 28px"}},
      !done && h(Fragment,null,
        errMsg&&h('div',{style:{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",borderRadius:11,padding:"12px 16px",marginBottom:16,color:"#f87171",fontSize:13}},"⚠ "+errMsg),
        h(Inp,{label:"Full Name",value:form.name,onChange:e=>F("name",e.target.value),placeholder:"Your full name",error:errs.name,icon:"👤"}),
        h(Inp,{label:"Email",type:"email",value:form.email,onChange:e=>F("email",e.target.value),placeholder:"you@email.com",error:errs.email,icon:"📧"}),
        h(Inp,{label:"Password",type:"password",value:form.password,onChange:e=>F("password",e.target.value),placeholder:"Min 6 characters",error:errs.password,icon:"🔒"}),
        h(Inp,{label:"Confirm Password",type:"password",value:form.confirm,onChange:e=>F("confirm",e.target.value),placeholder:"Repeat password",error:errs.confirm,icon:"🔒"}),
        h(Btn,{onClick:handleSignup,loading,style:{width:"100%",justifyContent:"center"},size:"lg"},"Create Account →"),
        h('p',{style:{textAlign:"center",marginTop:16,color:C.muted,fontSize:13}},
          "Have an account? ",h('span',{onClick:goLogin,style:{color:C.purpleL,fontWeight:700,cursor:"pointer"}},"Log In"))
      ),
      done&&h('div',{style:{textAlign:"center",padding:"20px 0"}},

        h('h3',{style:{fontWeight:900,color:"#c4b5fd",fontSize:18,marginBottom:8}},"Verification Sent!"),

// ─── Login ────────────────────────────────────────────
const Login = ({goSignup,onUserLogin,onAdminLogin}) => {
  const [form,setForm] = useState({email:"",password:""});
  const [err,setErr] = useState("");
  const [loading,setLoading] = useState(false);
  const F = (k,v) => setForm(f=>({...f,[k]:v}));

  const handle = async() => {
    setErr("");
    if(!form.email||!form.password){setErr("Fill in all fields");return;}
    setLoading(true);
    try{
      const auth = await getFirebaseAuth();
      const cred = await auth.signInWithEmailAndPassword(form.email.trim(),form.password);
      setLoading(false);
      if(cred.user.email.toLowerCase()===ADMIN_EMAIL.toLowerCase()){
        onAdminLogin(); return;
      }
      if(!cred.user.emailVerified){
        await auth.signOut();
        setErr("Please verify your email first. Check your inbox.");
        return;
      }
      const fs=await getFS();
      let bal=0;
      if(fs){
        const key=cred.user.email.toLowerCase().trim().replace(/[@.]/g,"_");
        const snap=await fs.collection("wallets").doc(key).get();
        bal=snap.exists?(snap.data().balance||0):0;
      }
      onUserLogin(cred.user.displayName||form.email.split("@")[0],cred.user.email.toLowerCase(),bal);
    }catch(e){
      setLoading(false);
      if(e.code==="auth/user-not-found"||e.code==="auth/wrong-password"||e.code==="auth/invalid-credential")
        setErr("Wrong email or password.");
      else if(e.code==="auth/too-many-requests")
        setErr("Too many attempts. Try again later.");
      else setErr("Login failed: "+(e.message||""));
    }
  };

  return h(AuthWrap,null,
    h('div',{style:{textAlign:"center",marginBottom:28}},
      h(Logo),
      h('h2',{style:{fontFamily:"Syne,sans-serif",fontSize:24,fontWeight:900,color:"#f0f0ff",marginTop:20,marginBottom:5}},"Welcome Back"),
      h('p',{style:{color:C.muted,fontSize:13}},"Log in to your OpulentSMM account")
    ),
    h(Card,{style:{padding:"32px 28px"}},
      err&&h('div',{style:{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",borderRadius:11,padding:"12px 16px",marginBottom:16,color:"#f87171",fontSize:13}},"⚠ "+err),
      h(Inp,{label:"Email",type:"email",value:form.email,onChange:e=>F("email",e.target.value),placeholder:"you@email.com",icon:"📧"}),
      h(Inp,{label:"Password",type:"password",value:form.password,onChange:e=>F("password",e.target.value),placeholder:"Your password",icon:"🔒"}),
      h(Btn,{onClick:handle,loading,style:{width:"100%",justifyContent:"center"},size:"lg"},"Log In →"),
      h('p',{style:{textAlign:"center",marginTop:16,color:C.muted,fontSize:13}},
        "New here? ",h('span',{onClick:goSignup,style:{color:C.purpleL,fontWeight:700,cursor:"pointer"}},"Create Account"))
    )
  );
};

const UserDash = ({userName,userEmail,onLogout}) => {
  const [page,setPage] = useState("overview");
  const [balance,setBalance] = useState(0);
  const [orders,setOrders] = useState([]);
  const [txns,setTxns] = useState([]);
  const [loading,setLoading] = useState(true);

  useEffect(()=>{
    const load = async() => {
      setLoading(true);
      try{
        const [bal,ords] = await Promise.all([
          DB.getBalanceFromFirebase(userEmail),
          DB.getOrdersFromFirebase(userEmail),
        ]);
        setBalance(bal);
        setOrders(ords);
      }catch(e){console.error(e);}
      setLoading(false);
    };
    if(userEmail) load();
  },[userEmail]);

  const refCode = useMemo(()=>
    "OPULENT-"+((userName||"USER").slice(0,4)).toUpperCase()+((userEmail.charCodeAt(0)*37+userEmail.length*13+1000)%9000+1000)
  ,[userEmail,userName]);

  const addOrderSync = (order) => {
    const withUser = {...order,userEmail:userEmail.toLowerCase().trim(),userName};
    DB.addOrder(withUser);
    setOrders(prev=>[withUser,...prev]);
    setBalance(b=>parseFloat((b-order.price).toFixed(2)));
  };

  const setBalanceSync = (v) => {
    setBalance(v);
    DB.updateUserBalanceAsync(userEmail,v).catch(console.error);

// ─── User New Order ───────────────────────────────────
const UserNewOrder = ({orders,addOrderSync,balance,setBalance,setPage,userEmail}) => {
  const [sel,setSel] = useState(null);
  const [qty,setQty] = useState("");
  const [link,setLink] = useState("");
  const [coupon,setCoupon] = useState("");
  const [discount,setDiscount] = useState(0);
  const [loading,setLoading] = useState(false);
  const VALID_COUPONS = {"OPULENT20":20,"SAVE10":10,"FIRST50":50};

  const calcPrice = () => {
    if(!sel||!qty) return 0;
    const n = parseInt(qty)||0;
    if(!sel.tiers) return parseFloat(((n*( sel.price||0))/1000).toFixed(2));
    let p = sel.tiers[0].price;
    for(const t of sel.tiers) if(n>=t.qty) p=t.price;
    return parseFloat(((n*p)/t.qty).toFixed(2));
  };

  const applyCoupon = () => {
    const code = coupon.trim().toUpperCase();
    if(VALID_COUPONS[code]) { setDiscount(VALID_COUPONS[code]); Toast.success("Coupon applied! "+VALID_COUPONS[code]+"% off"); }
    else { setDiscount(0); Toast.error("Invalid coupon code"); }
  };

  const rawPrice = calcPrice();
  const total = parseFloat((rawPrice*(1-discount/100)).toFixed(2));

  const placeOrder = async() => {
    if(!sel){Toast.error("Select a service");return;}
    const n=parseInt(qty)||0;
    if(n<(sel.min||0)){Toast.error("Minimum qty: "+(sel.min||0));return;}
    if(!link.trim()){Toast.error("Enter your social media link");return;}
    if(!isValidURL(link.trim())){Toast.error("Enter a valid URL (https://...)");return;}
    if(total>balance){Toast.error("Insufficient balance. Please add funds.");return;}

    setLoading(true);
    const order = {
      id:uid(), service:sel.name, platform:sel.platform,
      qty:n, link:link.trim(), price:total, status:"Processing",
      date:today(), createdAt:Date.now(), coupon:coupon||null,
    };
    addOrderSync(order);
    await DB.pushNotification(userEmail,"info","📦 Order Placed!","Your order for "+sel.name+" (qty: "+n+") has been placed and is processing.","orders");
    Toast.success("✅ Order placed! Processing started.");
    setLoading(false);
    setSel(null); setQty(""); setLink(""); setCoupon(""); setDiscount(0);
    setPage("orders");
  };

  return h('div',{className:"page-enter"},
    h(PgH,{title:"New Order",sub:"Balance: "+fmt(balance)}),
    // Service grid
    h('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14,marginBottom:24}},
      SERVICES.map(svc=>h('div',{key:svc.id,onClick:()=>{setSel(svc);setQty(String(svc.min||1000));},
        className:"svc-card-hover",style:{cursor:"pointer",
          background:sel?.id===svc.id?"rgba(124,58,237,.15)":"rgba(255,255,255,.04)",
          border:`1px solid ${sel?.id===svc.id?"rgba(124,58,237,.5)":C.border}`,
          borderRadius:14,padding:18,transition:"all .2s"}},
        h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
          h('span',{style:{fontSize:24}},svc.icon),
          svc.badge&&h('span',{style:{fontSize:10,padding:"2px 8px",borderRadius:20,background:"rgba(124,58,237,.15)",color:"#c4b5fd",fontWeight:700}},svc.badge)
        ),
        h('div',{style:{fontWeight:700,fontSize:14,color:"#e8e8f2",marginBottom:4}},svc.name),
        h('div',{style:{fontSize:11,color:C.muted,marginBottom:8}},svc.platform+" · From ₹"+(svc.tiers?svc.tiers[0].price:svc.price||0))
      ))
    ),

    // Order form
    sel&&h(Card,{glow:true,style:{padding:26,marginBottom:20}},
      h('h3',{style:{fontWeight:800,color:"#e8e8f2",fontSize:16,marginBottom:18}},"📋 Order: "+sel.name),
      h(Inp,{label:"Social Media Link",value:link,onChange:e=>setLink(e.target.value),placeholder:"https://instagram.com/...",icon:"🔗"}),
      h('div',{style:{marginBottom:16}},
        h('label',{style:{display:"block",fontSize:11,fontWeight:700,color:C.muted,letterSpacing:".07em",marginBottom:8,textTransform:"uppercase"}},"Quantity"),
        h('div',{style:{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}},

const UserAddFunds = ({balance,setBalance,setPage,setTxns,userName,userEmail}) => {
  const [amt,setAmt] = useState("500");
  const [step,setStep] = useState("select"); // select -> qr -> utr -> done
  const [utr,setUtr] = useState("");
  const [screenshot,setScreenshot] = useState(null);
  const [loading,setLoading] = useState(false);
  const [errMsg,setErrMsg] = useState("");
  const fileRef = useRef(null);
  const amounts = [100,250,500,1000,2000,5000];

  const handleFile = (e) => {
    const file=e.target.files[0]; if(!file) return;
    if(file.size>2*1024*1024){Toast.error("Max 2MB");return;}
    const r=new FileReader();
    r.onload=ev=>setScreenshot(ev.target.result);
    r.readAsDataURL(file);
  };

  const submitDeposit = async() => {
    setErrMsg("");
    const n=parseInt(amt)||0;
    if(n<100){setErrMsg("Minimum deposit is ₹100");return;}
    if(!utr.trim()){setErrMsg("Enter your UTR/Transaction ID");return;}
    if(utr.trim().length<6){setErrMsg("UTR must be at least 6 characters");return;}
    setLoading(true);
    try{
      const req = {
        id:"DEP-"+Date.now(), email:userEmail, userName:userName||userEmail.split("@")[0],
        amount:n, utr:utr.trim(), screenshot:screenshot||null,
        method:"UPI", date:today(), createdAt:Date.now(),
      };
      await DB.addDepositRequest(req);
      Toast.success("✅ Deposit request submitted! Admin will approve within 30 minutes.");
      setStep("done");
    }catch(e){
      setErrMsg("Failed: "+e.message);
    }
    setLoading(false);
  };

  const upiLink = `upi://pay?pa=${UPI_ID}&pn=${encodeURIComponent(UPI_NAME)}&am=${amt}&cu=INR`;
  const bonus = Math.round(parseInt(amt||0)*FIRST_DEPOSIT_BONUS_PCT/100);

  if(step==="done") return h('div',{className:"page-enter"},
    h(PgH,{title:"Add Funds"}),
    h(Card,{style:{padding:48,textAlign:"center",maxWidth:440,margin:"0 auto"}},
      h('div',{style:{fontSize:56,marginBottom:16}},"✅"),
      h('h3',{style:{fontFamily:"Syne,sans-serif",fontSize:22,fontWeight:900,color:"#34d399",marginBottom:10}},"Request Submitted!"),
      h('p',{style:{color:C.muted,fontSize:14,lineHeight:1.7,marginBottom:20}},
        "Your deposit request of ₹"+amt+" is under review. Admin verifies and credits your wallet within 30 minutes."),
      h(Btn,{onClick:()=>setPage("wallet"),style:{width:"100%",justifyContent:"center"}},"View Wallet →")
    )
  );

  return h('div',{className:"page-enter"},
    h(PgH,{title:"Add Funds",sub:"Top up your wallet via UPI"}),
    h('div',{style:{maxWidth:480}},
      // Amount selection
      h(Card,{style:{padding:22,marginBottom:16}},
        h('div',{style:{fontWeight:700,color:"#e8e8f2",fontSize:14,marginBottom:14}},"Select Amount"),
        h('div',{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}},
          amounts.map(a=>h('button',{key:a,onClick:()=>setAmt(String(a)),style:{
            padding:"12px 8px",borderRadius:10,fontWeight:700,fontSize:14,cursor:"pointer",
            background:amt==a?"rgba(124,58,237,.2)":"rgba(255,255,255,.04)",
            border:`1px solid ${amt==a?"rgba(124,58,237,.5)":C.border}`,
            color:amt==a?"#c4b5fd":C.text}},"₹"+a.toLocaleString()))
        ),
        h('input',{type:"number",value:amt,onChange:e=>setAmt(e.target.value),
          placeholder:"Or enter custom amount",style:{width:"100%",background:"rgba(255,255,255,.04)",
            border:`1px solid ${C.border}`,borderRadius:11,padding:"10px 14px",color:C.text,fontSize:14,boxSizing:"border-box"}}),
        parseInt(amt||0)>0&&h('div',{style:{marginTop:12,padding:"10px 14px",background:"rgba(212,160,23,.08)",
          border:"1px solid rgba(212,160,23,.2)",borderRadius:10,fontSize:13,color:C.goldL,fontWeight:600}},
          "💡 First deposit? You'll get ₹"+bonus+" bonus credit automatically!"
        )
      ),

      // QR + UPI
      h(Card,{style:{padding:22,marginBottom:16}},
        h('div',{style:{fontWeight:700,color:"#e8e8f2",fontSize:14,marginBottom:14}},"Pay via UPI"),
        h('div',{style:{background:"rgba(255,255,255,.08)",borderRadius:12,padding:16,textAlign:"center",marginBottom:14}},
          h('div',{style:{fontSize:13,color:C.muted,marginBottom:6}},"UPI ID:"),
          h('div',{style:{fontSize:15,fontWeight:800,color:C.goldL,fontFamily:"monospace"}},UPI_ID)
        ),
        h('a',{href:upiLink,style:{display:"block"}},
          h(Btn,{v:"gold",style:{width:"100%",justifyContent:"center"}},"Open UPI App to Pay")
        )

      // UTR input

        h('div',{style:{fontWeight:700,color:"#e8e8f2",fontSize:14,marginBottom:14}},"After Payment — Enter Details"),

          placeholder:"12-digit UTR number",icon:"🔢"}),
        // Screenshot upload

// ─── User Influencer ──────────────────────────────────
const UserInfluencer = ({userEmail,userName,refCode}) => {
  const [tab,setTab] = useState("dashboard");
  const [subs,setSubs] = useState([]);
  const [refs,setRefs] = useState({total:0,active:0,totalDeposit:0});
  const [loading,setLoading] = useState(true);
  const [form,setForm] = useState({type:"Instagram Story",link:"",followers:"",notes:""});
  const [proofImg,setProofImg] = useState(null);
  const [proofName,setProofName] = useState("");
  const [submitting,setSubmitting] = useState(false);
  const fileRef = useRef(null);
  const F = (k,v) => setForm(f=>({...f,[k]:v}));
  const refURL = "https://opulentsmm.in?ref="+refCode.toLowerCase();

  useEffect(()=>{
    if(!userEmail) return;
    (async()=>{
      setLoading(true);
      try{
        const fs=await getFS(); if(!fs){setLoading(false);return;}
        const [infSnap,refSnap] = await Promise.all([
          fs.collection("influencers").where("userEmail","==",userEmail.toLowerCase().trim()).get(),
          fs.collection("referrals").where("referralCode","==",refCode.toLowerCase()).get(),
        ]);
        setSubs(infSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)));
        const allRefs=refSnap.docs.map(d=>d.data());
        setRefs({
          total:allRefs.length,
          active:allRefs.filter(r=>r.isActive).length,
          totalDeposit:allRefs.reduce((s,r)=>s+(r.totalDeposit||0),0),
        });
      }catch(e){console.error(e);}
      setLoading(false);
    })();
  },[userEmail]);

  const handleProofImg = (e) => {
    const file=e.target.files[0]; if(!file) return;
    if(file.size>1.5*1024*1024){Toast.error("Max 1.5MB");return;}
    const r=new FileReader();
    r.onload=ev=>{setProofImg(ev.target.result);setProofName(file.name);};
    r.readAsDataURL(file);
  };

  const submit = async() => {
    if(!form.link.trim()){Toast.error("Enter proof link");return;}
    if(!form.followers||isNaN(form.followers)){Toast.error("Enter follower count");return;}
    if(!proofImg){Toast.error("Upload a screenshot");return;}
    setSubmitting(true);
    try{
      const fs=await getFS(); if(!fs) throw new Error("No connection");
      const existing=await fs.collection("influencers")
        .where("userEmail","==",userEmail.toLowerCase().trim())
        .where("status","in",["Pending","Approved"]).get();
      if(!existing.empty){Toast.error("You already have a pending/approved submission.");setSubmitting(false);return;}
      const followers=parseInt(form.followers)||0;
      const lvl=getInfluencerLevel(followers,refs.active);
      await fs.collection("influencers").doc("INF-"+Date.now()).set({
        id:"INF-"+Date.now(),userEmail:userEmail.toLowerCase().trim(),userName,
        type:form.type,link:sanitize(form.link),followers,notes:sanitize(form.notes),
        proofScreenshot:proofImg,referralCode:refCode.toLowerCase(),
        activeUsers:refs.active,totalReferrals:refs.total,
        level:lvl?.level||"Unqualified",reward:lvl?.reward||"None",rewardQty:lvl?.rewardQty||0,
        status:"Pending",createdAt:Date.now(),date:today(),
      });
      Toast.success("✅ Submitted! Admin reviews within 24 hours.");
      setForm({type:"Instagram Story",link:"",followers:"",notes:""});
      setProofImg(null); setProofName("");
      setTab("history");
    }catch(e){Toast.error("Failed: "+e.message);}
    setSubmitting(false);
  };

  const approvedSub = subs.find(s=>s.status==="Approved");
  const currentLevel = approvedSub ? getInfluencerLevel(approvedSub.followers||0,refs.active) : null;
  const nextLevel = currentLevel
    ? INFLUENCER_LEVELS[INFLUENCER_LEVELS.findIndex(l=>l.level===currentLevel.level)+1]||null
    : INFLUENCER_LEVELS[0];
  const progFollow = nextLevel ? Math.min(100,Math.round(((approvedSub?.followers||0)/nextLevel.minFollowers)*100)) : 100;
  const progActive = nextLevel ? Math.min(100,Math.round((refs.active/nextLevel.minActiveUsers)*100)) : 100;

  const tabs = [{id:"dashboard",l:"Dashboard"},{id:"submit",l:"Submit Proof"},{id:"history",l:"History"},{id:"levels",l:"Levels"}];

  return h('div',{className:"page-enter"},
    h(PgH,{title:"Influencer Program",sub:"Performance-based rewards"}),

    // Level card
    h(Card,{gold:true,style:{padding:24,marginBottom:20}},
      h('div',{style:{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:16}},
        h('div',{style:{flex:1}},
          h('div',{style:{fontSize:11,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:".08em"}},"Your Level"),
          currentLevel && h('div',{style:{display:"flex",alignItems:"center",gap:12,marginBottom:14}},
                h('span',{style:{fontSize:32}},currentLevel.icon),
                h('div',null,
                  h('div',{style:{fontWeight:900,color:currentLevel.color,fontSize:20,fontFamily:"Syne,sans-serif"}},currentLevel.level),
                  h('div',{style:{fontSize:12,color:"#34d399"}},currentLevel.reward)
                )
            ),
          !currentLevel && h('div',{style:{color:C.muted,fontSize:14,marginBottom:14}},"Submit proof to unlock rewards"),
          nextLevel&&h('div',null,
            h('div',{style:{display:"flex",justifyContent:"space-between",fontSize:11,color:C.muted,marginBottom:3}},
              h('span',"Followers"),h('span',{style:{color:nextLevel.color}},(approvedSub?.followers||0).toLocaleString()+" / "+nextLevel.minFollowers.toLocaleString())
            ),
            h('div',{style:{height:5,background:"rgba(255,255,255,.08)",borderRadius:10,overflow:"hidden",marginBottom:8}},
              h('div',{style:{height:"100%",width:progFollow+"%",background:nextLevel.color,borderRadius:10,transition:"width 1s"}})
            ),
            h('div',{style:{display:"flex",justifyContent:"space-between",fontSize:11,color:C.muted,marginBottom:3}},
              h('span',"Active Users"),h('span',{style:{color:"#34d399"}},refs.active+" / "+nextLevel.minActiveUsers)
            ),
            h('div',{style:{height:5,background:"rgba(255,255,255,.08)",borderRadius:10,overflow:"hidden"}},
              h('div',{style:{height:"100%",width:progActive+"%",background:"#34d399",borderRadius:10,transition:"width 1s"}})
            )
          )
        ),
        h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,minWidth:200}},
          [{l:"Total Referred",v:refs.total,c:"#c4b5fd"},{l:"Active Users",v:refs.active,c:"#34d399",hi:true},

// ── Admin AI Chat Manager ─────────────────────────────────
const AdminChatbot = () => {
  const [sessions,setSessions] = useState([]);
  const [sel,setSel] = useState(null);
  const [loading,setLoading] = useState(true);
  const [filter,setFilter] = useState("all");
  const [reply,setReply] = useState("");
  const [sending,setSending] = useState(false);

  const load = async() => {
    setLoading(true);
    try{
      const fs=await getFS(); if(!fs){setLoading(false);return;}
      const snap=await fs.collection("chatSessions").orderBy("lastMessage","desc").limit(100).get().catch(()=>({docs:[]}));
      setSessions(snap.docs.map(d=>({id:d.id,...d.data()})));
    }catch(e){}
    setLoading(false);
  };
  useEffect(()=>{load();const iv=setInterval(load,15000);return()=>clearInterval(iv);},[]);

  const sendReply = async() => {
    if(!reply.trim()||!sel) return;
    setSending(true);
    try{
      const fs=await getFS(); if(!fs) return;
      const sess=sessions.find(s=>s.id===sel);
      const msgs=[...(sess.messages||[]),{role:"admin",text:reply.trim(),ts:Date.now()}];
      await fs.collection("chatSessions").doc(sel).set({messages:msgs,hasAdminReply:true,status:"replied",lastMessage:Date.now()},{merge:true});
      setSessions(p=>p.map(s=>s.id===sel?{...s,messages:msgs,hasAdminReply:true}:s));
      setReply(""); Toast.success("Reply sent!");
    }catch(e){Toast.error("Failed");}
    setSending(false);
  };

  const resolve = async(id) => {
    try{const fs=await getFS();if(fs) await fs.collection("chatSessions").doc(id).set({status:"resolved"},{merge:true});}catch(e){}
    setSessions(p=>p.map(s=>s.id===id?{...s,status:"resolved"}:s));
    if(sel===id) setSel(null);
    Toast.success("Marked resolved");
  };

  const deleteSession = async(id) => {
    if(!window.confirm("Delete this chat session?")) return;
    try{
      const fs=await getFS();
      if(fs) await fs.collection("chatSessions").doc(id).delete();
      setSessions(p=>p.filter(s=>s.id!==id));
      if(sel===id) setSel(null);
      Toast.success("Session deleted");
    }catch(e){Toast.error("Failed to delete");}
  };

  const unread = sessions.filter(s=>!s.hasAdminReply&&s.status!=="resolved").length;
  const filtered = filter==="open"?sessions.filter(s=>s.status!=="resolved"):filter==="needs"?sessions.filter(s=>!s.hasAdminReply&&s.status!=="resolved"):filter==="resolved"?sessions.filter(s=>s.status==="resolved"):sessions;
  const selSess = sessions.find(s=>s.id===sel);

  return h('div',{className:"page-enter"},
    h(PgH,{title:"🤖 AI Chat Manager",sub:sessions.length+" sessions · "+unread+" need reply",
      action:h(Btn,{onClick:load,size:"sm",v:"ghost"},"🔄 Refresh")}),
    h('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:12,marginBottom:20}},
      [{l:"Total Chats",v:sessions.length,c:"#c4b5fd"},{l:"⚠ Need Reply",v:unread,c:"#f87171"},
       {l:"✅ Resolved",v:sessions.filter(s=>s.status==="resolved").length,c:"#34d399"},
       {l:"🤖 AI Handled",v:sessions.filter(s=>!s.hasAdminReply).length,c:"#fbbf24"},
       {l:"🔄 Auto-refresh",v:"15s",c:"#60a5fa"}].map(s=>
        h('div',{key:s.l,style:{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:12,padding:"14px",textAlign:"center"}},
          h('div',{style:{fontSize:22,fontWeight:900,color:s.c,fontFamily:"Syne,sans-serif"}},s.v),
          h('div',{style:{fontSize:10,color:C.muted,marginTop:3}},s.l)
        )
      )
    ),
    h('div',{style:{background:"rgba(212,160,23,.06)",border:"1px solid rgba(212,160,23,.2)",borderRadius:12,padding:"12px 18px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}},
      h('div',null,h('div',{style:{fontWeight:700,color:C.goldL,fontSize:13}},"🎯 Tawk.to Dashboard"),h('div',{style:{fontSize:11,color:C.muted}},"Your live chat is also active on Tawk.to")),
      h('a',{href:"https://dashboard.tawk.to",target:"_blank",rel:"noopener noreferrer",
        style:{padding:"8px 16px",background:"rgba(212,160,23,.15)",border:"1px solid rgba(212,160,23,.3)",borderRadius:9,color:C.goldL,fontSize:12,fontWeight:700,textDecoration:"none"}},"Open Tawk.to →")
    ),
    h('div',{style:{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}},
      [["all","All"],["open","Open"],["needs","Needs Reply"],["resolved","Resolved"]].map(([id,lb])=>
        h('button',{key:id,onClick:()=>setFilter(id),style:{padding:"7px 16px",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:700,
          border:"1px solid "+(filter===id?"rgba(124,58,237,.5)":C.border),

          color:filter===id?"#c4b5fd":C.muted}},lb)
      )
    ),
    h('div',{style:{display:"grid",gridTemplateColumns:sel?"1fr 1fr":"1fr",gap:16}},
      h('div',null,
        loading?h(CardSkel):
        filtered.length===0?h(Card,{style:{padding:40,textAlign:"center"}},
          h('div',{style:{fontSize:40,marginBottom:10}},"💬"),
          h('p',{style:{color:"#e8e8f2",fontWeight:700}},"No chat sessions yet"),

              h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}},

// ─── Admin Payments ───────────────────────────────────
const AdminPayments = ({deps,setDeps}) => {
  const [search,setSearch] = useState("");
  const [tab,setTab] = useState("pending");
  const [modalImg,setModalImg] = useState(null);

  const searched = search ? deps.filter(d=>(d.email||"").includes(search)||(d.utr||"").includes(search)||(d.userName||"").toLowerCase().includes(search.toLowerCase())) : deps;
  const shown = searched.filter(d=>d.status===tab);
  const statC = {pending:"#fbbf24",approved:"#34d399",rejected:"#f87171"};

  const approve = async(dep) => {
    if(!window.confirm("Approve ₹"+dep.amount+" for "+dep.userName+"?\nUTR: "+dep.utr)) return;
    try{
      const fs=await getFS(); if(!fs){Toast.error("No Firebase");return;}
      const key=dep.email.toLowerCase().trim().replace(/[@.]/g,"_");
      const wSnap=await fs.collection("wallets").doc(key).get();
      let bal=wSnap.exists?(wSnap.data().balance||0):0;
      let bonus=0;
      try{
        const prevDeps=await fs.collection("deposits").where("email","==",dep.email.toLowerCase().trim()).where("status","==","approved").get();
        if(prevDeps.empty){bonus=parseFloat((dep.amount*FIRST_DEPOSIT_BONUS_PCT/100).toFixed(2));}
      }catch(e){}
      const newBal=parseFloat((bal+dep.amount+bonus).toFixed(2));
      await fs.collection("wallets").doc(key).set({balance:newBal,email:dep.email.toLowerCase().trim(),ts:Date.now()});
      const depId=dep.id||dep._docId;
      if(!depId) throw new Error("Deposit ID missing");
      await fs.collection("deposits").doc(depId).set({status:"approved"},{merge:true});
      // Update totalDeposit
      try{
        const uSnap=await fs.collection("users").doc(key).get();
        const prev=uSnap.exists?(uSnap.data().totalDeposit||0):0;
        const newTotalDep=parseFloat((prev+dep.amount).toFixed(2));
        await fs.collection("users").doc(key).set({totalDeposit:newTotalDep},{merge:true});
        if(newTotalDep>=ACTIVE_USER_MIN_DEPOSIT && uSnap.exists && uSnap.data().referredBy){
          const rSnap=await fs.collection("referrals").where("newUserEmail","==",dep.email.toLowerCase().trim()).get();
          for(const d of rSnap.docs) await d.ref.set({isActive:true,totalDeposit:newTotalDep},{merge:true});
        }
      }catch(e){console.error("totalDeposit update failed:",e);}
      await DB.pushNotification(dep.email,"deposit_approved","💰 Deposit Approved!","₹"+dep.amount+" added to your wallet"+(bonus>0?" + ₹"+bonus+" bonus!":""),"wallet");
      setDeps(prev=>prev.map(x=>x.id===dep.id?{...x,status:"approved"}:x));
      Toast.success("✅ Approved ₹"+dep.amount+" for "+dep.userName+(bonus>0?" (+₹"+bonus+" bonus)":""));
    }catch(e){Toast.error("❌ Failed: "+e.message);}
  };

  const reject = async(dep) => {
    if(!window.confirm("Reject deposit of ₹"+dep.amount+" from "+dep.userName+"?")) return;
    const depId=dep.id||dep._docId;
    try{const fs=await getFS();if(fs) await fs.collection("deposits").doc(depId).set({status:"rejected"},{merge:true});}catch(e){Toast.error("Failed");return;}
    setDeps(prev=>prev.map(x=>x.id===dep.id?{...x,status:"rejected"}:x));
    Toast.warning("Rejected");
  };

  return h('div',{className:"page-enter"},
    modalImg&&h('div',{onClick:()=>setModalImg(null),style:{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
      h('img',{src:modalImg,alt:"Screenshot",style:{maxWidth:"90vw",maxHeight:"90vh",objectFit:"contain",borderRadius:12}}),
      h('button',{onClick:()=>setModalImg(null),style:{position:"absolute",top:16,right:16,background:"#d4a017",border:"none",borderRadius:"50%",width:36,height:36,fontSize:18,cursor:"pointer",fontWeight:900}},"✕")
    ),
    h(PgH,{title:"Payments",sub:"Approve/reject deposits"}),
    h('input',{value:search,onChange:e=>setSearch(e.target.value),placeholder:"🔍 Search...",
      style:{width:"100%",background:"rgba(255,255,255,.04)",border:`1px solid ${C.border}`,borderRadius:10,
        padding:"10px 14px",color:C.text,fontSize:13,marginBottom:14,boxSizing:"border-box"}}),
    h('div',{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}},
      ["pending","approved","rejected"].map(s=>
        h('div',{key:s,onClick:()=>setTab(s),style:{
          padding:"14px",textAlign:"center",borderRadius:12,cursor:"pointer",
          background:tab===s?`${statC[s]}15`:"rgba(255,255,255,.03)",
          border:`1px solid ${tab===s?statC[s]:C.border}`}},
          h('div',{style:{fontSize:20,fontWeight:900,color:statC[s]}},deps.filter(d=>d.status===s).length),
          h('div',{style:{fontSize:11,color:C.muted,marginTop:3}},s.charAt(0).toUpperCase()+s.slice(1))
        )
      )
    ),
    h('div',{style:{display:"flex",flexDirection:"column",gap:12}},
      shown.length===0
        ? h(Card,{style:{padding:30,textAlign:"center",color:C.muted}},"No "+tab+" deposits")
        : shown.map(dep=>h(Card,{key:dep.id,style:{padding:18}},
            h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}},
              h('div',{style:{flex:1}},
                h('div',{style:{display:"flex",alignItems:"center",gap:10,marginBottom:8,flexWrap:"wrap"}},
                  h('div',{style:{width:36,height:36,borderRadius:"50%",background:C.gG,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"#000",fontSize:14}},
                    (dep.userName||"U")[0].toUpperCase()),
                  h('div',null,
                    h('div',{style:{fontWeight:800,color:"#f0f0ff",fontSize:14}},dep.userName),
                    h('div',{style:{fontSize:11,color:C.muted}},dep.email)
                  ),
                  h('span',{style:{fontSize:11,padding:"2px 8px",borderRadius:20,fontWeight:700,
                    background:`${statC[dep.status]||"#888"}18`,color:statC[dep.status]||"#888"}},
                    dep.status==="pending"?"⏳ Pending":dep.status==="approved"?"✅ Approved":"❌ Rejected")
                ),
                h('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(100px,1fr))",gap:8,marginBottom:10}},
                  [["Amount","₹"+dep.amount,C.goldL],["UTR",dep.utr,"#c4b5fd"],["Method",dep.method||"UPI",C.muted],["Date",dep.date,C.muted]].map(([l,v,c])=>
                    h('div',{key:l,style:{background:"rgba(255,255,255,.04)",borderRadius:8,padding:"7px 10px"}},
                      h('div',{style:{fontSize:9,color:C.muted,marginBottom:2,textTransform:"uppercase"}},l),
                      h('div',{style:{fontSize:12,fontWeight:700,color:c,wordBreak:"break-all"}},v)
                    )
                  )
                ),
                dep.screenshot&&h('div',null,
                  h('div',{style:{fontSize:10,color:C.muted,marginBottom:4}},"📸 PAYMENT SCREENSHOT — ",h('span',{style:{color:"#34d399"}},"Click to enlarge")),
                  h('img',{src:dep.screenshot,alt:"Payment",onClick:()=>setModalImg(dep.screenshot),style:{
                    width:"100%",maxWidth:220,height:"auto",objectFit:"contain",borderRadius:10,
                    border:"1px solid rgba(52,211,153,.4)",cursor:"pointer",display:"block"}})
                )
              ),
              dep.status==="pending"&&h('div',{style:{display:"flex",flexDirection:"column",gap:8,minWidth:110}},
                h(Btn,{onClick:()=>approve(dep)},"✅ Approve"),
                h(Btn,{v:"danger",onClick:()=>reject(dep)},"❌ Reject")
              )
            )
          ))
    )
  );
};

// ─── Admin Influencer ─────────────────────────────────
const AdminInfluencer = () => {
  const [subs,setSubs] = useState([]);
  const [loading,setLoading] = useState(true);
  const [filter,setFilter] = useState("Pending");
  const [modalImg,setModalImg] = useState(null);

  useEffect(()=>{
    (async()=>{
      setLoading(true);
      try{const fs=await getFS();if(fs){const snap=await fs.collection("influencers").get();setSubs(snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)));}}catch(e){}
      setLoading(false);
    })();
  },[]);

  const approve = async(sub) => {
    if(!window.confirm("Approve "+sub.userName+"?\nLevel: "+sub.level+"\nActive Users: "+sub.activeUsers)) return;
    try{
      const fs=await getFS();if(!fs) return;
      await fs.collection("influencers").doc(sub.id).update({status:"Approved",adminNote:"Approved by admin",reviewedAt:Date.now()});
      await DB.pushNotification(sub.userEmail,"info","🌟 Influencer Approved!","Your submission has been approved. Reward: "+sub.reward,"influencer");
      setSubs(s=>s.map(x=>x.id===sub.id?{...x,status:"Approved"}:x));
      Toast.success("Approved "+sub.userName);
    }catch(e){Toast.error("Failed: "+e.message);}
  };

  const reject = async(sub) => {
    if(!window.confirm("Reject "+sub.userName+"'s submission?")) return;
    try{
      const fs=await getFS();if(!fs) return;
      await fs.collection("influencers").doc(sub.id).update({status:"Rejected",adminNote:"Does not meet requirements",reviewedAt:Date.now()});
      setSubs(s=>s.map(x=>x.id===sub.id?{...x,status:"Rejected"}:x));
      Toast.warning("Rejected");
    }catch(e){Toast.error("Failed: "+e.message);}
  };

  const sendReward = async(sub) => {
    const val=Math.max(10,Math.round((sub.rewardQty||0)*0.15));
    if(!window.confirm("Send reward to "+sub.userName+"?\nWallet credit: ₹"+val)) return;
    try{
      const fs=await getFS();if(!fs) return;
      const bal=await DB.getBalanceFromFirebase(sub.userEmail);
      await DB.updateUserBalanceAsync(sub.userEmail,parseFloat((bal+val).toFixed(2)));
      await fs.collection("influencers").doc(sub.id).update({rewardSent:true,rewardValue:val,rewardSentAt:Date.now()});
      await DB.pushNotification(sub.userEmail,"deposit_approved","🎁 Influencer Reward!","₹"+val+" added to your wallet.","wallet");
      setSubs(s=>s.map(x=>x.id===sub.id?{...x,rewardSent:true}:x));
      Toast.success("Reward ₹"+val+" sent to "+sub.userName);
    }catch(e){Toast.error("Failed: "+e.message);}
  };

  const statC={Pending:"#fbbf24",Approved:"#34d399",Rejected:"#f87171"};
  const filtered = filter==="All" ? subs : subs.filter(s=>s.status===filter);

  return h('div',{className:"page-enter"},
    modalImg&&h('div',{onClick:()=>setModalImg(null),style:{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
      h('img',{src:modalImg,alt:"Proof",style:{maxWidth:"90vw",maxHeight:"90vh",objectFit:"contain",borderRadius:12}}),
      h('button',{onClick:()=>setModalImg(null),style:{position:"absolute",top:16,right:16,background:"#d4a017",border:"none",borderRadius:"50%",width:36,height:36,fontSize:18,cursor:"pointer",fontWeight:900}},"✕")
    ),
    h(PgH,{title:"Influencers",sub:subs.length+" submissions · Anti-fake system active"}),
    h('div',{style:{background:"rgba(52,211,153,.05)",border:"1px solid rgba(52,211,153,.2)",borderRadius:12,padding:"12px 18px",marginBottom:16,fontSize:12,color:C.muted}},
      "🛡️ ",h('strong',{style:{color:"#34d399"}},"Anti-Fake Active.")," Only users who deposited ₹"+ACTIVE_USER_MIN_DEPOSIT+"+ or placed ≥1 order count as active referrals."
    ),
    h('div',{style:{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}},
      ["All","Pending","Approved","Rejected"].map(s=>
        h('button',{key:s,onClick:()=>setFilter(s),style:{
          padding:"7px 16px",borderRadius:20,border:`1px solid ${filter===s?"rgba(124,58,237,.5)":C.border}`,
          background:filter===s?"rgba(124,58,237,.15)":"transparent",
          color:filter===s?"#c4b5fd":C.muted,fontSize:12,fontWeight:700,cursor:"pointer"}},
          s+" ("+( s==="All"?subs.length:subs.filter(x=>x.status===s).length)+")")
      )
    ),
    loading?h('div',{style:{display:"flex",flexDirection:"column",gap:10}},[1,2].map(i=>h(CardSkel,{key:i}))):
    filtered.length===0?h(Card,{style:{padding:30,textAlign:"center",color:C.muted}},"No "+filter.toLowerCase()+" submissions"):
    h('div',{style:{display:"flex",flexDirection:"column",gap:12}},
      filtered.map(s=>{
        const lvl=INFLUENCER_LEVELS.find(l=>l.level===s.level);
        const isQ=getInfluencerLevel(s.followers||0,s.activeUsers||0)!==null;
        return h(Card,{key:s.id,style:{padding:18}},
          h('div',{style:{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:12}},
            h('div',{style:{flex:1}},
              h('div',{style:{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:8}},
                h('span',{style:{fontSize:20}},lvl?.icon||"🌟"),
                h('div',null,h('div',{style:{fontWeight:800,color:"#e8e8f2",fontSize:14}},s.userName),h('div',{style:{fontSize:11,color:"#60a5fa"}},s.userEmail)),
                h('span',{style:{fontSize:10,padding:"2px 8px",borderRadius:20,fontWeight:700,background:`${statC[s.status]||"#888"}18`,color:statC[s.status]||"#888"}},s.status),
                isQ&&h('span',{style:{fontSize:10,padding:"2px 8px",borderRadius:20,background:"rgba(52,211,153,.12)",color:"#34d399",fontWeight:700}},"✓ QUALIFIED"),
                !isQ&&s.status==="Pending"&&h('span',{style:{fontSize:10,padding:"2px 8px",borderRadius:20,background:"rgba(239,68,68,.1)",color:"#f87171",fontWeight:700}},"⚠ NOT QUALIFIED"),
                s.activeUsers===0&&h('span',{style:{fontSize:10,padding:"2px 8px",borderRadius:20,background:"rgba(239,68,68,.12)",color:"#f87171",fontWeight:700}},"🚩 0 ACTIVE")
              ),
              h('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(100px,1fr))",gap:8,marginBottom:8}},
                [["Followers",(s.followers||0).toLocaleString()],["Active Users",s.activeUsers||0],["Reward",s.reward||"None"],["Date",s.date||""]].map(([l,v])=>
                  h('div',{key:l,style:{background:"rgba(255,255,255,.04)",borderRadius:8,padding:"7px 10px"}},
                    h('div',{style:{fontSize:9,color:C.muted,marginBottom:2,textTransform:"uppercase"}},l),
                    h('div',{style:{fontSize:12,fontWeight:700,color:"#c4b5fd"}},v)
                  )
                )
              ),
              s.proofScreenshot&&h('div',null,
                h('div',{style:{fontSize:10,color:C.muted,marginBottom:4}},"📸 Proof — ",h('span',{style:{color:"#34d399"}},"click to enlarge")),
                h('img',{src:s.proofScreenshot,alt:"Proof",onClick:()=>setModalImg(s.proofScreenshot),style:{maxWidth:160,maxHeight:120,objectFit:"contain",borderRadius:8,border:"1px solid rgba(124,58,237,.3)",cursor:"pointer",display:"block"}})
              )
            ),
            h('div',{style:{display:"flex",flexDirection:"column",gap:7,minWidth:110,flexShrink:0}},
              s.status==="Pending"&&h(Fragment,null,
                h(Btn,{size:"sm",onClick:()=>approve(s)},"✅ Approve"),
                h(Btn,{v:"danger",size:"sm",onClick:()=>reject(s)},"❌ Reject")
              ),
              s.status==="Approved"&&!s.rewardSent&&h(Btn,{v:"gold",size:"sm",onClick:()=>sendReward(s)},"🎁 Send Reward"),
              s.status==="Approved"&&s.rewardSent&&h('span',{style:{fontSize:10,color:"#34d399",fontWeight:700,textAlign:"center"}},"✓ Reward Sent")
            )
          )
        );
      })
    )
  );
};

// ─── Admin Referrals ──────────────────────────────────
const AdminReferrals = () => {
  const [refs,setRefs] = useState([]);
  const [loading,setLoading] = useState(true);
  const [search,setSearch] = useState("");

  useEffect(()=>{
    (async()=>{
      setLoading(true);
      try{const fs=await getFS();if(fs){const snap=await fs.collection("referrals").get();setRefs(snap.docs.map(d=>({id:d.id,...d.data()})));}}catch(e){}
      setLoading(false);
    })();
  },[]);

  const grouped = refs.reduce((m,r)=>{
    const k=(r.referralCode||"unknown").toLowerCase();
    const e=m[k]||{code:k,total:0,active:0,totalDeposit:0,emails:[]};
    e.total++; if(r.isActive) e.active++;
    e.totalDeposit+=r.totalDeposit||0;
    e.emails.push({email:r.newUserEmail,isActive:r.isActive,deposit:r.totalDeposit||0,orders:r.totalOrders||0});
    m[k]=e; return m;
  },{});
  const rows = Object.values(grouped).sort((a,b)=>b.active-a.active||b.total-a.total);
  const filtered = search ? rows.filter(r=>r.code.includes(search.toLowerCase())) : rows;
  const totalActive = refs.filter(r=>r.isActive).length;
  const totalDep = refs.reduce((s,r)=>s+(r.totalDeposit||0),0);

  return h('div',{className:"page-enter"},
    h(PgH,{title:"Referrals",sub:refs.length+" total signups · "+totalActive+" active"}),
    h('div',{style:{background:"rgba(52,211,153,.05)",border:"1px solid rgba(52,211,153,.18)",borderRadius:12,padding:"12px 18px",marginBottom:16,fontSize:12,color:C.muted}},
      "🛡️ Active = deposited ₹"+ACTIVE_USER_MIN_DEPOSIT+"+ OR placed ≥1 order. ",
      h('strong',{style:{color:"#f87171"}},refs.length-totalActive+" inactive (zero deposit)")," signups are tracked but excluded from rewards."
    ),
    h('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:14,marginBottom:20}},
      [{l:"Total Signups",v:refs.length,c:"#c4b5fd"},{l:"Active",v:totalActive,c:"#34d399"},
       {l:"Inactive",v:refs.length-totalActive,c:"#f87171"},{l:"Total Deposits",v:"₹"+totalDep.toFixed(0),c:C.goldL},
       {l:"Unique Codes",v:rows.length,c:"#a855f7"}].map(s=>
        h('div',{key:s.l,style:{background:"rgba(255,255,255,.04)",borderRadius:11,padding:"14px 16px",textAlign:"center"}},
          h('div',{style:{fontSize:20,fontWeight:900,color:s.c}},s.v),
          h('div',{style:{fontSize:10,color:C.muted,marginTop:3}},s.l)
        )
      )
    ),
    h('input',{value:search,onChange:e=>setSearch(e.target.value),placeholder:"🔍 Search by referral code...",
      style:{width:"100%",background:"rgba(255,255,255,.04)",border:`1px solid ${C.border}`,borderRadius:10,
        padding:"10px 14px",color:C.text,fontSize:13,marginBottom:14,boxSizing:"border-box"}}),
    loading?h('div',{style:{display:"flex",flexDirection:"column",gap:10}},[1,2].map(i=>h(CardSkel,{key:i}))):
    filtered.length===0?h(Card,{style:{padding:40,textAlign:"center"}},h('p',{style:{color:C.muted}},"No referral data yet.")):
    h('div',{style:{display:"flex",flexDirection:"column",gap:12}},
      filtered.map(r=>h(Card,{key:r.code,style:{padding:18,border:`1px solid ${r.active>0?"rgba(52,211,153,.2)":C.border}`}},
        h('div',{style:{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:12}},
          h('div',{style:{fontFamily:"monospace",fontWeight:900,color:C.goldL,fontSize:15}},r.code.toUpperCase()),
          h('div',{style:{display:"flex",gap:10,flexWrap:"wrap"}},
            [{v:r.total,l:"Signups",c:"#c4b5fd"},{v:r.active,l:"Active",c:"#34d399",hi:true},{v:r.total-r.active,l:"Inactive",c:"#f87171"},{v:"₹"+r.totalDeposit.toFixed(0),l:"Deposits",c:C.goldL}].map(s=>
              h('div',{key:s.l,style:{textAlign:"center",background:s.hi?"rgba(52,211,153,.06)":"rgba(255,255,255,.04)",
                border:`1px solid ${s.hi?"rgba(52,211,153,.2)":C.border}`,borderRadius:9,padding:"8px 14px"}},
                h('div',{style:{fontSize:18,fontWeight:900,color:s.c}},s.v),
                h('div',{style:{fontSize:10,color:C.muted}},s.l)
              )
            )
          )
        ),
        r.total>0&&h('div',{style:{marginBottom:10}},
          h('div',{style:{display:"flex",justifyContent:"space-between",fontSize:10,color:C.muted,marginBottom:3}},
            h('span',"Active rate"),h('span',{style:{color:"#34d399"}},Math.round((r.active/r.total)*100)+"%")),
          h('div',{style:{height:4,background:"rgba(255,255,255,.06)",borderRadius:10,overflow:"hidden"}},
            h('div',{style:{height:"100%",width:Math.round((r.active/r.total)*100)+"%",background:"#34d399",borderRadius:10}})
          )
        ),
        h('div',{style:{display:"flex",flexDirection:"column",gap:5}},
          r.emails.slice(0,4).map((u,i)=>h('div',{key:i,style:{display:"flex",alignItems:"center",gap:10,padding:"5px 10px",
            background:u.isActive?"rgba(52,211,153,.05)":"rgba(255,255,255,.02)",
            border:`1px solid ${u.isActive?"rgba(52,211,153,.15)":"rgba(255,255,255,.04)"}`,borderRadius:7}},
            h('span',{style:{color:u.isActive?"#34d399":"#f87171",fontSize:12}},u.isActive?"✅":"❌"),
            h('span',{style:{fontSize:11,color:"#60a5fa",fontFamily:"monospace",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},u.email),
            h('span',{style:{fontSize:10,color:C.muted,whiteSpace:"nowrap"}},"₹"+u.deposit.toFixed(0)+" · "+u.orders+" orders")
          )),
          r.emails.length>4&&h('div',{style:{fontSize:11,color:C.muted,padding:"3px 10px"}},"+"+( r.emails.length-4)+" more")
        )
      ))
    )
  );
};

// ─── Admin Tickets ────────────────────────────────────
const AdminTickets = () => {
  const [tickets,setTickets] = useState([]);
  const [loading,setLoading] = useState(true);

  useEffect(()=>{
    (async()=>{
      setLoading(true);
      try{const fs=await getFS();if(fs){const snap=await fs.collection("tickets").get();setTickets(snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)));}}catch(e){}
      setLoading(false);
    })();
  },[]);

  const resolve = async(t) => {
    try{const fs=await getFS();if(fs) await fs.collection("tickets").doc(t.id).update({status:"Resolved"});
    setTickets(prev=>prev.map(x=>x.id===t.id?{...x,status:"Resolved"}:x));Toast.success("Marked resolved");}catch(e){Toast.error("Failed");}
  };

  return h('div',{className:"page-enter"},
    h(PgH,{title:"Support Tickets",sub:tickets.filter(t=>t.status==="Open").length+" open"}),
    loading?h(CardSkel):
    tickets.length===0?h(Card,{style:{padding:40,textAlign:"center"}},h('p',{style:{color:C.muted}},"No tickets.")):
    h('div',{style:{display:"flex",flexDirection:"column",gap:10}},
      tickets.map(t=>h(Card,{key:t.id,style:{padding:18}},
        h('div',{style:{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:8}},
          h('div',null,
            h('div',{style:{fontWeight:700,color:"#e8e8f2",fontSize:14}},t.subject),
            h('div',{style:{fontSize:11,color:"#60a5fa"}},t.userEmail+" · "+t.date)
          ),
          h('div',{style:{display:"flex",gap:8,alignItems:"center"}},
            h('span',{style:{fontSize:11,padding:"2px 8px",borderRadius:20,fontWeight:700,
              background:t.status==="Open"?"rgba(96,165,250,.15)":"rgba(52,211,153,.15)",
              color:t.status==="Open"?"#60a5fa":"#34d399"}},t.status),
            t.status==="Open"&&h(Btn,{size:"sm",v:"ghost",onClick:()=>resolve(t)},"Mark Resolved")
          )
        ),
        h('div',{style:{fontSize:12,color:C.muted,marginBottom:4}},t.category),
        h('div',{style:{fontSize:13,color:"#c4b5fd",lineHeight:1.55}},t.message)
      ))
    )
  );
};

// ─── Admin Coupons ────────────────────────────────────
const AdminCoupons = () => {
  const [coupons,setCoupons] = useState([{code:"OPULENT20",discount:20,uses:0},{code:"SAVE10",discount:10,uses:0}]);
  const [form,setForm] = useState({code:"",discount:""});
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));

  const add = () => {
    if(!form.code.trim()||!form.discount){Toast.error("Fill all fields");return;}
    setCoupons(prev=>[...prev,{code:form.code.trim().toUpperCase(),discount:parseInt(form.discount)||0,uses:0}]);

    Toast.success("Coupon added");

  return h('div',{className:"page-enter"},
    h(PgH,{title:"Coupons"}),

};

// ─── Admin Announce ───────────────────────────────────
const AdminAnnounce = () => {
  const [list,setList] = useState([]);
  const [form,setForm] = useState({title:"",body:"",type:"Info"});
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));

  useEffect(()=>{
    (async()=>{try{const fs=await getFS();if(fs){const snap=await fs.collection("config").doc("announcements").get();if(snap.exists) setList(snap.data().list||[]);}}catch(e){}})();
  },[]);

  const add = async() => {
    if(!form.title.trim()||!form.body.trim()){Toast.error("Fill all fields");return;}
    const newList=[{id:"ANN-"+Date.now(),...form,date:today()},...list];
    setList(newList);
    DB.setAnnounce(newList);
    setForm({title:"",body:"",type:"Info"});
    Toast.success("Announcement published");
  };

  return h('div',{className:"page-enter"},
    h(PgH,{title:"Announcements"}),
    h(Card,{style:{padding:22,marginBottom:20,maxWidth:500}},
      h('div',{style:{fontWeight:700,color:"#e8e8f2",fontSize:14,marginBottom:14}},"New Announcement"),
      h(Inp,{label:"Title",value:form.title,onChange:e=>F("title",e.target.value),placeholder:"Announcement title"}),
      h('div',{style:{marginBottom:16}},
        h('label',{style:{display:"block",fontSize:11,fontWeight:700,color:C.muted,letterSpacing:".07em",marginBottom:6,textTransform:"uppercase"}},"Message"),
        h('textarea',{value:form.body,onChange:e=>F("body",e.target.value),rows:3,placeholder:"Your message...",
          style:{width:"100%",background:"rgba(255,255,255,.04)",border:`1px solid ${C.border}`,borderRadius:11,padding:"10px 14px",color:C.text,fontSize:13,resize:"vertical",fontFamily:"inherit",boxSizing:"border-box"}})
      ),
      h(Btn,{onClick:add,style:{width:"100%",justifyContent:"center"}},"Publish Announcement")
    ),
    h(Card,{style:{padding:22}},
      h('div',{style:{fontWeight:700,color:"#e8e8f2",fontSize:14,marginBottom:14}},"Published ("+list.length+")"),
      list.length===0?h('p',{style:{color:C.muted,fontSize:13}},"No announcements yet."):
      h('div',{style:{display:"flex",flexDirection:"column",gap:10}},
        list.map(a=>h('div',{key:a.id,style:{padding:"12px 0",borderBottom:`1px solid ${C.border}`}},
          h('div',{style:{fontWeight:700,color:"#e8e8f2",fontSize:14,marginBottom:3}},a.title),
          h('div',{style:{fontSize:12,color:C.muted,marginBottom:4}},a.date),
          h('div',{style:{fontSize:13,color:"#c4b5fd"}},a.body)
        ))
      )
    )
  );
};

  const [userEmail,setUserEmail] = useState(sessionStorage.getItem("nx_email")||"");

  // Check hash for admin route
  useEffect(()=>{
    const checkHash = () => {
      if(window.location.hash==="secure-opulent-dashboard-9821") {
        setScreen("adminlogin");
      }
    };
    checkHash();
    window.addEventListener("hashchange",checkHash);
    return()=>window.removeEventListener("hashchange",checkHash);
  },[]);

  // Restore session
  useEffect(()=>{
    const sc=sessionStorage.getItem("nx_screen");
    if(sc==="user"&&sessionStorage.getItem("nx_email")) setScreen("user");
    else if(sc==="admin") setScreen("admin");
  },[]);

  const onUserLogin = (name,email,bal) => {
    setUserName(name); setUserEmail(email);
    sessionStorage.setItem("nx_screen","user");
    sessionStorage.setItem("nx_name",name);
    sessionStorage.setItem("nx_email",email);
    setScreen("user");
  };

  const onAdminLogin = () => {
    sessionStorage.setItem("nx_screen","admin");
    setScreen("admin");
  };

  const onLogout = async() => {
    try{const auth=await getFirebaseAuth();await auth.signOut();}catch(e){}
    sessionStorage.clear();
    setUserName(""); setUserEmail("");
    setScreen("landing");
    window.location.hash="";

    landing:    () => h(Landing,{goLogin:()=>setScreen("login"),goSignup:()=>setScreen("signup")}),

    admin:      () => h(AdminDash,{onLogout}),
  };

  return h(Fragment,null,
    h(ToastContainer),
    (screens[screen]||screens.landing)()
  );
}

  /* Keep _ocbBot as alias for admin replies (no quick replies) */
  function _ocbBot(html){ _ocbBotMsg(html,[]); }

  function _ocbUser(txt){
    var m=document.getElementById("ocb-msgs");if(!m)return;
    var w=document.createElement("div");
    w.style.cssText="align-self:flex-end;display:flex;flex-direction:column;align-items:flex-end;max-width:82%";
    var b=document.createElement("div");b.className="ou";b.textContent=txt;w.appendChild(b);
    var t=document.createElement("div");t.className="ot";t.style.textAlign="right";t.textContent=_ocbTs();w.appendChild(t);
    m.appendChild(w);m.scrollTop=m.scrollHeight;
  }

  function _ocbTyp(){
    var m=document.getElementById("ocb-msgs");if(!m)return;
    var d=document.createElement("div");d.className="ob otyp";d.id="ocb-td";
    d.innerHTML="<span></span><span></span><span></span>";
    m.appendChild(d);m.scrollTop=m.scrollHeight;

  function _ocbSave(u,b){
    try{
      if(typeof firebase==="undefined"||!firebase.apps||!firebase.apps.length)return;
      _ocbHistory.push({role:"user",text:u,ts:Date.now()});
      _ocbHistory.push({role:"bot",text:b,ts:Date.now()+100});
      var name=sessionStorage.getItem("nx_name")||"Visitor";
      var email=sessionStorage.getItem("nx_email")||"anonymous";
      firebase.firestore().collection("chatSessions").doc(_ocbSid).set({
        sessionId:_ocbSid,userName:name,userEmail:email,
        messages:_ocbHistory,lastMessage:Date.now(),hasAdminReply:false,status:"open"
      },{merge:true}).catch(function(){});
    }catch(e){}
  }

  function _ocbChkAdmin(){
    try{
      if(typeof firebase==="undefined"||!firebase.apps||!firebase.apps.length)return;
      firebase.firestore().collection("chatSessions").doc(_ocbSid).get().then(function(doc){
        if(!doc.exists)return;
        var msgs=doc.data().messages||[];
        var last=msgs.filter(function(m){return m.role==="admin";}).slice(-1)[0];
        if(!last)return;
        if(!_ocbHistory.some(function(m){return m.role==="admin"&&m.ts===last.ts;})){
          _ocbHistory.push(last);
          /* Show unread dot if chat is closed */
          if(!_ocbOpen){
            _ocbUnread++;
            var dot=document.getElementById("ocb-dot");
            if(dot){dot.textContent=_ocbUnread;dot.style.display="flex";}
          }
          _ocbBot("&#x1F468;&#x200D;&#x1F4BB; <b>Support Team:</b><br>"+last.text.replace(/\\n/g,"<br>"));
        }
      }).catch(function(){});
    }catch(e){}
  }

  function ocbSend(){
    var inp=document.getElementById("ocb-inp");
    if(!inp||!inp.value.trim())return;
    var txt=inp.value.trim();inp.value="";
    _ocbUser(txt);_ocbTyp();
    setTimeout(function(){
      var td=document.getElementById("ocb-td");
      if(td&&td.parentNode)td.parentNode.removeChild(td);
      var res=_ocbAns(txt);
      _ocbBotMsg(res.a, res.q);
      _ocbSave(txt, res.a);
    },700+Math.random()*500);
  }

  function ocbClose(){
    var w=document.getElementById("ocb-win");
    if(w)w.style.display="none";
    _ocbOpen=false;
    if(_ocbTimer){clearInterval(_ocbTimer);_ocbTimer=null;}
  }

  function ocbToggle(){
    var w=document.getElementById("ocb-win");
    if(!w)return;
    _ocbOpen=!_ocbOpen;
    if(_ocbOpen){
      w.style.display="flex";
      _ocbUnread=0;
      var dot=document.getElementById("ocb-dot");
      if(dot)dot.style.display="none";
      var m=document.getElementById("ocb-msgs");
      if(m&&m.children.length===0){
        setTimeout(function(){
          _ocbBotMsg(
            "Welcome to <b>OpulentSMM!</b> &#x1F44B;<br><br>I'm your AI assistant, available 24/7!<br>Ask me anything or tap a quick option:",
            ["Pricing","Instagram","YouTube","How to Order","Payment","Free Bonus"]
          );
        },300);
      }
      /* Poll for admin replies every 8 seconds */
      _ocbTimer=setInterval(_ocbChkAdmin,8000);
      var inp=document.getElementById("ocb-inp");
      if(inp)setTimeout(function(){inp.focus();},400);
    } else {
      w.style.display="none";
      if(_ocbTimer){clearInterval(_ocbTimer);_ocbTimer=null;}
    }
  }

  /* Show notification dot after 6 seconds */
  setTimeout(function(){
    if(!_ocbOpen){
      var dot=document.getElementById("ocb-dot");
      if(dot){dot.textContent="1";dot.style.display="flex";}
    }
  },6000);
